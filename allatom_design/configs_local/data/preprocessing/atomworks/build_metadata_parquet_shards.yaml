mmcif_dir: /home/possu/jinho/datasets/val_cifs/lmpnn_val_cifs/cifs
out_dir: /home/possu/jinho/datasets/atomworks_lmpnnval

num_workers: 20
max_file_size: 20000000
return_filtered_atom_array: false

# Data preprocessor args to specify in addition to the cif parser args
data_preprocessor_cfg:
  from_rcsb: true
  build_assembly: "first"

  # Cutoff distances
  close_distance: 30.0
  contact_distance: 5
  second_shell_distance: 8
  clash_distance: 1.0
  
  # Ignore residues
  ignore_residues: [] #! (JH) changed 250926
  # Efficiency
  polymer_pn_unit_limit: 500

# CIF parser args
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ["UNL", "UNX", "UNK"]
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  add_bond_types_from_struct_conn: ["covale"]

# --- sharding for multi-node runs ---
num_shards: 1     # total number of shards
shard_id: 0       # per-job shard id