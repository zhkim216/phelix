name: mask_selector

# Masking schedules
restype_masking_schedule: "uniform_t"
atom_masking_schedule: "uniform_t" 

# Configs (shared between restype and atom masking)
masking_cfg:
  constant_t:
    t: 0.0
  uniform_t:
    t_min: 0.0
    t_max: 1.0  
  uniform_squared_t:
    t_min: 0.0
    t_max: 1.0
  uniform_cubed_t:
    t_min: 0.0
    t_max: 1.0
  uniform_cosine_t:
    t_min: 0.0
    t_max: 1.0
  uniform_sqrt_t:
    t_min: 0.0
    t_max: 1.0
  uniform_cbrt_t:
    t_min: 0.0
    t_max: 1.0
  
scn_context_ratio: 0.02

# Reference to shared config (can be overridden separately if needed)
restype_masking_cfg: ${.masking_cfg}
atom_masking_cfg: ${.masking_cfg}