# elix dataset configuration
# Override validation_ids_file and filters for local elix runs
validation_ids_file: /home/possu/jinho/datasets/val_cifs/mg_native_val_cifs_test/mg_nativeval_sm_all.txt
val_metadata_path: /home/possu/jinho/datasets/val_cifs/mg_native_val_cifs_test/metadata_for_training_mg_nativeval_sm_all.parquet
train_metadata_path: /home/possu/jinho/datasets/atomworks_pdb_full_v9/debug_metadata_ligval_seq_clustered_03_with_mg_pubmed_evidence.parquet

# --- Dataset-specific filters (moved from debug_ligand_cond.yaml) ---
# NA-NA cutoff for small nucleic-acid ligand grouping.
nucleic_acid_group_distance_cutoff: 4.5

# Dataset specific filter toggles
use_biologically_meaningful_small_molecule: true
use_biologically_meaningful_small_molecule_context: true
use_biologically_meaningful_metal: true
use_biologically_meaningful_halide: true

# Iterative narrowing of inter-dependent flags (BMSM_context / BMM / BMH).
# null = run until convergence; positive int = cap (logs warning if not converged).
max_narrow_loop_iter: null

# Biologically meaningful small molecule narrowing. `num_contacting_protein_chains` accepts:
#   null                   -> disable
#   int (e.g. 1)           -> "num_contacting_protein_chains == <int>" (backward-compat)
#   str "== 1" / ">= 2"    -> auto-prefixed with column name
#   str "num_contacting_protein_chains >= 1 and num_contacting_protein_chains <= 3"
#                          -> used as-is as a pandas-eval expression
biologically_meaningful_small_molecule:
  num_contacting_protein_chains: "num_contacting_protein_chains >= 1 and num_contacting_protein_chains <= 2"
  exclude_covalently_linked_to_protein: true
  # Atom-level pocket gates (v9 parquet; sourced from
  # `q_pn_unit_per_partner_contacts_to_protein_small_molecule` and
  # `q_pn_unit_expected_heavy_atoms_non_polymer`). Null disables either gate.
  min_contacting_protein_atoms: 20                 # >= threshold; null to disable
  min_contacting_protein_atom_ratio: 1.0           # >= threshold; null to disable
  # Crystallographic-quality gates (v9 parquet). Null disables either gate.
  min_resolution_ratio: 0.8                        # >= threshold; null to disable
  min_avg_occupancy_nonpolymer: 0.5                # >= threshold; null to disable

# Biologically meaningful small-molecule context narrowing. Identifies ligands
# that form chains / are buried by other ligands (vs. BMSM which signals binding
# to a protein chain). Same cutoff schema as BMSM but applied to neighbor
# heavy atoms across all partner types (sm/metal/halide/protein/...).
# Effective neighbor count excludes partners whose own modality flag has been
# narrowed out — see `_iterative_narrow_bm_flags`.
biologically_meaningful_small_molecule_context:
  min_neighboring_heavy_atoms: 20                  # >= threshold; null to disable
  min_neighboring_heavy_atoms_ratio: 1.0           # >= threshold; null to disable

# Biologically meaningful metal / halide narrowing. Adds derived flag columns
# `q_pn_unit_is_biologically_meaningful_metal` / `q_pn_unit_is_biologically_meaningful_halide`
# computed as raw `is_metal`/`is_halide` AND the gates below. The
# `min_n_coordination_partners` gate counts only partners whose own modality
# flag passes (BMSM/BMSM_context for sm, BMM for metal, BMH for halide; protein/
# other always count). Rows are not dropped.
biologically_meaningful_metal:
  min_n_coordination_partners: 3                   # >= threshold; null to disable
  min_avg_occupancy_nonpolymer: 0.5                # >= threshold; null to disable
biologically_meaningful_halide:
  min_n_coordination_partners: 3                   # >= threshold; null to disable
  min_avg_occupancy_nonpolymer: 0.5                # >= threshold; null to disable

train_filters:
  metadata_filter:
    - "release_date <= '2022-12-16'"
    - "resolution < 9.0"
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"
    - "num_polymer_pn_units < 50"
  protein_monomer_chain_filter:
    - "(q_pn_unit_is_protein and 20 <= q_pn_unit_num_resolved_residues < 2048)"
  interface_filter:
    # Small-molecule interface centers are selected by the explicit BMSM flag.
    # Maybe-covalent small molecules can remain in metadata as featurizer context
    # but do not become BMSM-centered interface rows.
    "1":
      - "resolution < 3.5"
      - "q_pn_unit_is_biologically_meaningful_small_molecule or q_pn_unit_is_nuc_ligand or (q_pn_unit_is_protein and (20 <= q_pn_unit_num_resolved_residues < 2048))"
    "2":
      - "(interface_type == 'bmsm_protein' and n_small_molecule == 1) or interface_type == 'nuc_lig_protein'"

val_filters:
  metadata_filter:
    - "release_date <= '2022-12-16'"
    - "resolution < 3.5"
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"
