name: lc_atom_mpnn

defaults:
  - _self_
  - interpolant: edm_interpolant

task: ${model.task}

# Backbone noise options
augment_eps: 0.3
per_residue_eps: false
max_eps: null  # for per_residue_eps, samples from half-normal truncated to this value

mpnn:
  n_channel: 128
  k_neighbors: 48
  n_layers: 3
  dropout_p: 0.1
  ligand_conditioning: false
  num_rbf: 16

  # ligand conditioning options
  lmpnn_module:
    num_context_feature_processor_layers: 2
    num_context_feature_aggregator_layers: 2    
    edge_update: false

  token_features:
    ca_only: false
    k_neighbors: ${denoiser.mpnn.k_neighbors}    
    num_positional_embeddings: 16
    node_n_channel: ${denoiser.mpnn.n_channel}
    edge_n_channel: ${denoiser.mpnn.n_channel}
    num_rbf: ${denoiser.mpnn.num_rbf}
    use_multichain_encoding: true
    token_bonds_masking: true 
    ligand_conditioning: ${denoiser.mpnn.ligand_conditioning}
    use_sidechain_context: false
    use_ligand_context: false
    ligand_atom_context_num: 16  
    sidechain_context_token_num: 16
    calc_pseudo_cb_coords: true

  potts:
    k_neighbors_potts: 48
    max_dist_potts: null
    use_potts: true
    parameterization: "factor"
    num_factors: null
    symmetric_J: true
