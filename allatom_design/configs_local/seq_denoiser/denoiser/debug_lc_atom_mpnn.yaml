name: lc_atom_mpnn

defaults:
  - _self_
  - interpolant: edm_interpolant

task: ${model.task}

mpnn:
  n_channel: 128
  k_neighbors: 32
  n_layers: 3
  dropout_p: 0.1
  ligand_conditioning: true

  # ligand conditioning options
  lmpnn_module:
    num_context_feature_processor_layers: 2
    num_context_feature_aggregator_layers: 2    
    edge_update: false

  token_features:
    num_rbf: 16
    min_rbf_mean: 2.0
    max_rbf_mean: 22.0
    protein_graph_rbf_type: "ncacocb" # "ca", "ncaco", "ncacocb"
    k_neighbors: ${denoiser.mpnn.k_neighbors}    
    num_positional_embeddings: 16
    node_n_channel: ${denoiser.mpnn.n_channel}
    edge_n_channel: ${denoiser.mpnn.n_channel}
    protein_ligand_interaction_rbf_type: "ncacocb" # "cb", "ncacocb"
    add_angle_features: true
    use_multichain_encoding: true
    ligand_conditioning: ${denoiser.mpnn.ligand_conditioning}
    use_sidechain_context: true
    use_ligand_context: true
    ligand_atom_context_num: 25  
    sidechain_context_token_num: 16
    # Pocket-aware RBF: use full backbone RBF for ligand pocket residues, CA-only for others
    use_pocket_rbf: true  # false for backward compat; set true to enable pocket-aware RBF
    pocket_rbf_type: "ncaco"  # "ncaco" or "ncacocb" - RBF type for pocket residue edges
    pocket_rbf_distance: 4.0  # distance threshold (Å) for pseudo-CB pocket definition

    masked_distance_fill: 1000.0

  potts:
    k_neighbors_potts: 32
    max_dist_potts: null
    use_potts: true
    parameterization: "factor"
    num_factors: null
    symmetric_J: true
