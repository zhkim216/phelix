# Self-consistency evaluation config for AF3
# For evaluating pre-designed samples (e.g. caliby-designed structures)

# Wandb settings
wandb:
  no_wandb: true  # Disable wandb logging
  project: "ligand_seq_des"
  wandb_id: "zhkim216"  # Wandb username
  group: null

# Basic settings
debug: true
num_debug_samples: 2
seed: 0
protein_only: false
input_sample_is_designed: true
sampling_inputs_csv: null  # Optional CSV with pdb_id, query_pn_unit_iids columns

# Outputs
exp_name: eval_lmpnn010_denovoval_af3
base_out_dir: /scratch/users/zhkim216/out_dir/debug_eval_ligand_seq_des

# Configurations for getting designed sample paths
pdb_cfg:
  pdb_dir: /scratch/users/zhkim216/out_dir/eval_ligand_seq_des/eval_lmpnn010_denovoval_af3/samples/backbones
  pdb_name_list: null
  pdb_name_ext: ".cif"
  n_subsample: null
  # Recursive search (not needed for flat directories)
  recursive: false
  split_by_subfolder: false
  # Sample index filtering
  sample_indices: [0,1,2,3,4]
  # Slurm array job parameters (set via CLI override in sbatch)
  array_id: 21
  num_arrays: 62

# Pocket configuration
pocket_cfg:
  pocket_distance_for_docking_metrics: 8.0

######### Data & Transform configurations #########
# Configurations for cif files
cif_cfg:
  parse:
    native_samples:
      add_missing_atoms: true
      remove_waters: true
      remove_ccds: []
      fix_ligands_at_symmetry_centers: true
      fix_arginines: true
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: "all"
    designed_samples:
      add_missing_atoms: false #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: null
    af3_predictions:
      add_missing_atoms: false #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: null

preprocess_cfg:
  native_samples:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  designed_samples:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  af3_predictions:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: false #! AF3 prediction CIF files have OXT atoms, so need to preserve them
    remove_terminal_oxygen_nucleic_acid: false

featurizer_cfg:
  prepare_designed_samples:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true
  prepare_af3_predictions:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true

######### Structure prediction model configuration (AF3) #########
struct_pred_cfg:
  model_name: "af3"
  evaluate_self_consistency: true
  calculate_metrics_only: false
  af3:
    runner_path: /home/possu/jinho/allatom-design/alphafold3/run_alphafold_debug_local.py
    json_config:
      model_seeds: [42]
      version: 2
    inference_config:
      base:
        model_dir: /home/possu/jinho/model_params/af3
        db_dir: /home/possu/jinho/af3_databases
        flash_attention_implementation: "xla"
      ss:  # Single-sequence prediction config
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 0
        ligand_protein_template_conditioning_mode: 0
        mask_template_sidechains: true
        mask_template_sequence: true
      tc:  # Template-conditioned prediction config
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 1
        ligand_protein_template_conditioning_mode: 1
        mask_template_sidechains: true
        mask_template_sequence: true
        max_template_date: "2021-09-30"

hydra:
  run:
    dir: /home/possu/jinho/hydra_outputs
