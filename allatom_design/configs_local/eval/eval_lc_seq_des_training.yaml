# Wandb configuration
wandb:
  no_wandb: false  # Disable wandb logging
  project: "ligand_seq_des"  # Wandb project name
  wandb_id: "zhkim216"  # Wandb username
  group: "debug" # Wandb group name

# Run settings
seed: 0
num_workers: 1  # for dataloading
debug: true
num_sample_debug: 2
start_step: 55000  # start evaluation after this step, 0 or null to start from the beginning
end_step: 55000  # end evaluation after this step (inclusive), null to evaluate until the end
eval_every_n_ckpts: 1  # evaluate every n checkpoints, for speed
eval_last_ckpt: true
use_ema: false
evaluate_self_consistency: true
evaluate_template_conditioned_docking: true

# Skip sampling options (use when sampling is already done)
skip_sampling: false  # if true, skip sampling and load from skip_sampling_dir
skip_sampling_dir: /home/possu/jinho/out_dir/debug_eval_ligand_seq_des/debug_eval_af3_exp1_cfg0/step_55000_epoch_35  # directory containing samples/ folder from previous run

# Metadata
metadata_path: /home/possu/jinho/datasets/atomworks_lmpnn_valset_filtered/interface_df_ver1.parquet

# Outputs
exp_name: eval_af3_exp1_cfg0 # experiment name; used for wandb and output directory
base_out_dir: /home/possu/jinho/out_dir/eval_ligand_seq_des  # outputs will be saved to base_out_dir/exp_name

# Input data and saving cif configuration for sequence design
data_cfg_for_design:
  load_from_cache: true  
  load_cache_cfg:
    cached_example_path: "/home/possu/jinho/datasets/atomworks_lmpnn_valset_filtered/cached_examples"
    pdb_name_ext: ".pt"
    n_subsample: null
  pdb_cfg:
    pdb_dir: /home/possu/jinho/datasets/val_cifs/lmpnn_val_cifs/pdbs
    pdb_name_ext: ".cif"  # if pdb_name_list does not have extensions, add this extension
    n_subsample: null  # randomly sample this many pdb keys, null to use all
  use_load_any: false
  cif_parser_args:
    add_missing_atoms: True
    remove_waters: True
    remove_ccds: []
    fix_ligands_at_symmetry_centers: True
    fix_arginines: True
    convert_mse_to_met: True
    hydrogen_policy: "remove"
    extra_fields: "all"  
  cif_save_args:
    date: "1959-01-07" #! Young-Ae Lee's birthday
    include_entity_poly: True
    include_entity_nonpoly: True
    include_nan_coords: False
    include_bonds: True
    extra_fields: "all"
    extra_categories:
      pdbx_audit_revision_history:
        ordinal: [1]
        revision_id: [1]
        revision_date: ["1959-01-08"]
        major_revision: [1]
        minor_revision: [0]
        revision_description: ["Dummy date for template-conditioning AF3"]

# Transform configuration for sequence design
transform_cfg_for_design:
  featurizer_cfg:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true
    residue_cache_dir: /home/possu/jinho/datasets/atomworks_cached_residue_data
    max_conformers_per_residue: 50
    apply_random_augmentation: false
    translation_scale: 1.0
  preprocess_cfg:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: True 
    remove_terminal_oxygen_nucleic_acid: True

# cif loading configuration for AF3 prediction
data_cfg_for_af3_prediction:  
  load_from_cache: false
  use_load_any: false
  cif_parser_args: # Use aw_parse only because of pn_unit_iids
    add_missing_atoms: True #! For charge annotation. AF3 predictions are supposed to not have missing atoms.
    remove_waters: False
    remove_ccds: []
    fix_ligands_at_symmetry_centers: False #! Explicitly avoids fixing ligands to see af3's original ligand predictions.
    fix_arginines: False
    convert_mse_to_met: False
    hydrogen_policy: "remove"
    extra_fields: []  # AF3 CIF files don't have custom annotations like chain_type    

transform_cfg_for_af3_prediction:
  featurizer_cfg:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true
    residue_cache_dir: /home/possu/jinho/datasets/atomworks_cached_residue_data
    max_conformers_per_residue: 50
    apply_random_augmentation: false
    translation_scale: 1.0
  preprocess_cfg:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: False 
    remove_terminal_oxygen_nucleic_acid: False

# Denoiser options
denoiser_train_dir: /home/possu/jinho/out_dir/ligand_seq_des/exp1_cfg0
sampling_cfg_overrides:
  batch_size: 1
  num_seqs_per_pdb: 2  # number of sequences to sample per pdb
  omit_aas: null  # exclude certain aatypes globally, e.g. ["C", "G"]. "X" is always excluded.
  noise_labels: null
  num_workers: ${num_workers}
  use_potts_sampling: true
  ligand_conditioning: true
  ligand_pocket_dist_cutoff: 5.0
  small_molecule_only: true
  potts_sampling_cfg:
    potts_sweeps: 500
    lcp_expand_edge_idx_fix: true

# Positional constraints: supports columns in [pdb_key,fixed_pos_seq,fixed_pos_scn,fixed_pos_override_seq,pos_restrict_aatype]
# e.g. 2fyzA,"A1-100,B1-100","A1-100"
pos_constraint_csv: null
  
# Sequence design config
seq_des_cfg:
  model_name: "lc_atom_mpnn"
  atom_mpnn:
    ckpt_path: null
    sampling_cfg: /home/possu/jinho/allatom-design/allatom_design/configs_local/seq_des/lc_atom_mpnn_inference.yaml
    overrides: ${sampling_cfg_overrides}

# Structure prediction model args
struct_pred_cfg:
  model_name: "af3"
  af3:
    runner_path: /home/possu/jinho/allatom-design/alphafold3/run_alphafold_debug_local.py
    json_config:      
      model_seeds: [42]
      version: 2
    inference_config:
      base:
        model_dir: /home/possu/jinho/model_params/af3
        db_dir: /home/possu/jinho/af3_databases
        flash_attention_implementation: "xla"
      ss:
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 0
        ligand_protein_template_conditioning_mode: 0
        mask_template_sidechains: true
        mask_template_sequence: true            
      tc:
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 1
        ligand_protein_template_conditioning_mode: 1
        mask_template_sidechains: true
        mask_template_sequence: true
        max_template_date: "2021-09-30"

docking_metrics_cfg:
  binding_site_radius: 8.0  # Radius for binding site superposition in docking metrics
  save_aligned: true
  
hydra:
  run:
    dir: /home/possu/jinho/hydra_outputs
