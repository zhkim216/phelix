########### Basic settings #########
debug: true
num_debug_samples: 10
seed: 0
direction: "ortho_to_allo"   # { "allo_to_active" | "ortho_to_allo" }

# Model checkpoint (reused from exp35_cfg2 EMA, same as analyze_potts_pocket)
ckpt_path: /home/possu/jinho/out_dir/ligand_seq_des/exp35_cfg2/checkpoints/ema/sd-step82500-epoch52-ema0.99.ckpt
sampling_cfg_path: /home/possu/jinho/allatom-design/allatom_design/configs_local/seq_des/lc_atom_mpnn_inference.yaml

# AlloBench inputs
allobench_csv: /home/possu/jinho/allatom-design/allobench/AlloBench.csv
asd_csv: /home/possu/jinho/allatom-design/allobench/ASD_High_Resolution.csv
pdb_structures_dir: /home/possu/jinho/allatom-design/allobench/pdb_structures
monomer_only: true
min_chain_length: 30
max_tokens_for_forward: 1200

# Output
output_dir: /home/possu/jinho/allatom-design/local_debug_output/260412/allobench_pr

# MMseqs2 alignment
mmseqs_bin: /home/possu/jinho/mmseqs/bin/mmseqs
mmseqs_threads: 8
min_alignment_identity: 0.8

# Orthosteric ligand inference
# Any non-allosteric ligand entity with an atom <= active_site_proximity of
# any active-site residue atom is counted as orthosteric.
active_site_proximity: 5.0
# Orthosteric pocket residue = any protein residue within ortho_cutoff of any
# orthosteric ligand atom.
ortho_cutoff: 6.0

# MAD thresholds (per-PDB): threshold = median + k * sigma_factor * MAD(delta_J)
mad_k_values: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
mad_sigma_factor: 1.4826

# Distance-binned MAD: per-PDB equal-count quantile bins of distance to perturbation source.
# Bin variable picked by direction (dist_to_ortho for ortho_to_allo, dist_to_allo for allo_to_active).
n_distance_bins: 8

######### Data & Transform configurations #########
input_sample_is_designed: false

cif_parse_cfg:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: []
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  extra_fields: "all"

preprocess_cfg:
  undesired_res_names: []
  b_factor_min: null
  b_factor_max: null
  min_residues_for_polymers: 0
  remove_terminal_oxygen_protein: true
  remove_terminal_oxygen_nucleic_acid: true

# Determinism: two forward passes on the same PDB must see identical features,
# so random augmentation is disabled (the native_val analyze_potts_pocket script
# leaves it on because it happens to not break anything there).
featurizer_cfg:
  is_inference: true
  occupancy_threshold_protein_backbone: 0.0
  training_structure_noise: 0.0
  undesired_res_names: []
  remove_keys: []
  remove_unresolved_tokens: true
  max_tokens: null
  max_atoms: null
  pocket_distance: 6.0
  residue_cache_dir: "/home/possu/jinho/datasets/atomworks_cached_residue_data"
  max_conformers_per_residue: 50
  apply_random_augmentation: false
  translation_scale: 1.0

hydra:
  run:
    dir: /home/possu/jinho/hydra_outputs
