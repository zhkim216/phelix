# Redesign pocket sequence config
# This config is for evaluating pre-designed samples from CaliBy codebase

########### Basic settings #########
# Wandb settings
wandb:
  no_wandb: true  # Disable wandb logging
  project: "ligand_seq_des"
  wandb_id: "zhkim216"  # Wandb username
  group: null

# Basic settings
debug: false
num_debug_samples: 1
seed: 0
num_workers: 0 # for dataloading

# Metadata
metadata_path: null

# Outputs
exp_name: caliby_lcaliby_redesign_rfd3val # experiment name; used for wandb and output directory
base_out_dir: /home/possu/jinho/allatom-design/local_debug_output/260111

# Sequence design config
seq_des_cfg:  
  model_name: "lc_atom_mpnn"
  denoiser_train_dir: /home/possu/jinho/out_dir/ligand_seq_des/exp2_cfg2
  ckpt_cfg:
    start_step: 22500
    end_step: 22500
    eval_every_n_ckpts: 1
    eval_last_ckpt: false
    use_ema: true
  atom_mpnn:
    ckpt_path: null
    sampling_cfg: /home/possu/jinho/allatom-design/allatom_design/configs_local/seq_des/lc_atom_mpnn_inference.yaml
    overrides:
      batch_size: 1
      num_seqs_per_pdb: 2  # number of sequences to sample per pdb
      omit_aas: null  # exclude certain aatypes globally, e.g. ["C", "G"]. "X" is always excluded.
      noise_labels: null
      num_workers: ${num_workers}
      use_potts_sampling: true
      ligand_conditioning: true
      potts_sampling_cfg:
        potts_sweeps: 500
        lcp_expand_edge_idx_fix: true

# Positional constraints: supports columns in [pdb_key,fixed_pos_seq,fixed_pos_scn,fixed_pos_override_seq,pos_restrict_aatype]
# e.g. 2fyzA,"A1-100,B1-100","A1-100"
pos_constraint_csv: null
  
# Redesign pocket sequence options
redesign_cfg:
  use_native_seq: false #! If false, automatically redesign the pocket sequence using lcaliby
  pocket_distance: 5.0

# Docking metrics configuration
docking_metrics_cfg:
  pocket_distance_for_metrics: 8.0

######### Data & Transform configurations #########
is_all_atom_sample: false
sample_is_designed: true
load_from_cache: false

# Configurations for getting native or designed structures' paths
pdb_cfg:
  pdb_dir: /home/possu/jinho/datasets/val_cifs/rfd3_ligand_conditional/lig_binder
  pdb_name_list: /home/possu/jinho/datasets/val_cifs/rfd3_ligand_conditional/rfd3_min_max_median_len150_filtered_nonsimilar_ccd_clustered03.txt
  pdb_name_ext: ".cif"
  n_subsample: null  # null to use all samples

# Configurations for loading ligand atom arrays from ligand source path
ligand_source_cfg:
  ligand_source_path: /home/possu/jinho/datasets/val_cifs/rfd3_ligand_conditional/lig_binder
  add_ligands_to_designed_samples: false
  source_is_designed: true

#### For designing samples ####
# Configurations for cif files
cif_cfg:
  parse:
    native:
      add_missing_atoms: true
      remove_waters: true
      remove_ccds: []
      fix_ligands_at_symmetry_centers: true
      fix_arginines: true
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: "all"      
    designed_samples:
      add_missing_atoms: true #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: null  
    af3_predictions:
      add_missing_atoms: true #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: null  
  save:
    date: "1959-01-07" #! Young-Ae Lee's birthday
    include_entity_poly: True
    include_entity_nonpoly: True
    include_nan_coords: False #! designed structures should not have nan coords
    include_bonds: True
    extra_fields: "all"
    exclude_field_keys: ["token_id", "is_ligand_pocket"]
    extra_categories:
      pdbx_audit_revision_history:
        ordinal: [1]
        revision_id: [1]
        revision_date: ["1959-01-07"]
        major_revision: [1]
        minor_revision: [0]
        revision_description: ["Dummy date for template-conditioning AF3"]

preprocess_cfg:
  native:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  designed_samples:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  af3_predictions:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: false #! AF3 prediction CIF files have OXT atoms, so need to preserve them
    remove_terminal_oxygen_nucleic_acid: false #! AF3 prediction CIF files have OXT atoms, so need to preserve them

featurizer_cfg:
  design:
    max_tokens: null
    max_atoms: null
    remove_keys: []    
    remove_unresolved_tokens: true
    residue_cache_dir: "/home/possu/jinho/datasets/atomworks_cached_residue_data"
    max_conformers_per_residue: 50
    apply_random_augmentation: false
    translation_scale: 1.0
    pocket_distance: 8.0
  prepare_designed_samples:
    max_tokens: null
    max_atoms: null
    remove_keys: []    
    remove_unresolved_tokens: true
  prepare_af3_predictions:
    max_tokens: null
    max_atoms: null
    remove_keys: []    
    remove_unresolved_tokens: true

######### Structure prediction model configuration (AF3) #########
struct_pred_cfg:
  model_name: "af3"
  evaluate_self_consistency: true
  calculate_metrics_only: false
  af3:
    runner_path: /home/possu/jinho/allatom-design/alphafold3/src/alphafold3/run_alphafold.py
    json_config:
      model_seeds: [42]
      version: 2
    inference_config:
      base:
        model_dir: /home/possu/jinho/model_params/af3
        db_dir: /home/possu/jinho/af3_databases
        flash_attention_implementation: "xla"
      ss:  # Single-sequence prediction config
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 0
        ligand_protein_template_conditioning_mode: 0
        mask_template_sidechains: true
        mask_template_sequence: true
      tc:  # Template-conditioned prediction config
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 1
        ligand_protein_template_conditioning_mode: 1
        mask_template_sidechains: true
        mask_template_sequence: true
        max_template_date: "2021-09-30"

hydra:
  run:
    dir: /home/possu/jinho/hydra_outputs
