# Run settings
seed: 0
batch_size: 16
num_workers: 8

# Inputs
checkpoint_path: null
pdb_dir: null
pdb_key_list: null  # list of keys to use from the pdb_dir, null to use all .pdb files. Should include extension.
out_dir: null
partial_t: 0.8
subset_length_range: [64, 512]

# Inverse folding options
aatype_decoding_order_mode: "random"
num_steps: 1
temperature: 0.1
repack_last: true
psce_threshold: null
timestep_schedule:
  num_steps: null
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.5
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"
  af2:
    data_dir: /media/scratch/huang_lab/af2
    num_models: 1
    sample_models: true
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
