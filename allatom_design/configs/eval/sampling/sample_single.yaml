# Run settings
seed: 0
batch_size: 64
num_workers: 8

# Inputs
checkpoint_path: null
pdb_path: null
fixed_pos_seq: # comma-separated, chain + residue index specification, e.g. "A1-100,B1-100"
fixed_pos_scn: # null for no provided sidechains, otherwise should be subset of fixed_pos_seq, e.g. "A1-100"
out_dir: null
run_self_consistency_eval: false

# Inverse folding options
aatype_decoding_order_mode: "random"
num_corrector_steps: 0
corrector_step_ratio: 0.5
num_steps: 20
num_samples: 16
temperature: 0.1
repack_last: true  # after design, repack the final sequence obtained
timestep_schedule:
  num_steps: null  # will be filled in by num_steps_list
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  # Sidechain diffusion parameters
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.5
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"  # ["esmfold", "af2", "omegafold"]
  af2:
    data_dir: /media/scratch/huang_lab/af2  # directory containing "params/" with af2 model params
    num_models: 1  # only 1 model is currently supported
    sample_models: true  # randomly sample models from the ensemble
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024
  omegafold:
    num_pseudo_msa: 15
    mask_rate: 0.12
    num_recycle: 2  # performance saturates after around 10 recycles
    deterministic: true
    subbatch_size: null
    cache_file: /media/scratch/huang_lab/cache/omegafold/omegafold.pt

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
