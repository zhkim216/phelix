sd_ckpt:

num_workers: 10
out_dir: null  # null to save in the model run directory
exp_name: test  # sampling experiment name
overwrite_out_dir: true  # if true, delete existing output directory
seed: 0
batch_size: 16

# Data options for overriding denoiser config (null values default to denoiser config)
data:
    pdb_path: /media/scratch/datasets/ingraham_cath_dataset
    designability_csv: /media/scratch/datasets/ingraham_cath_dataset/all_esmfold_native_with_cath_gapped_with_tm_with_seq.csv
    n_random_subset: null

# Evaluation mode
run_codes_sc: true  # run co-design self-consistency eval

# Inverse folding run parameters
num_pdbs: 16  # number of structures to inverse fold
num_seqs_per_pdb: 1  # number of sequences per structure to inverse fold
subset_length_range: [32, 256]
n_traj: 8  # number of trajectories to randomly save
limit_traj_steps: 10  # limit the number of steps we save in a trajectory (evenly spaced)
limit_diff_traj_steps: 3
traj_conect: false


# Sampling hyperparameters
aatype_decoding_order_mode: "random"
timestep_schedule:
  num_steps: 10
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  # Sidechain diffusion parameters
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.4
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}


# MPNN args
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 8
    number_of_batches: 1
    verbose: false

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
