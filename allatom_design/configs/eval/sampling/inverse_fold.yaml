# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
group: "debug" # Wandb group name
no_wandb: false


# Sampling run settings
sd_ckpt:
exp_name: test  # sampling experiment name

num_workers: 10
out_dir: null  # null to save in the model run directory
overwrite_out_dir: true  # if true, delete existing output directory
seed: 0
batch_size: 16

# Data options for overriding denoiser config (null values default to denoiser config)
data:
    pdb_path: /media/scratch/datasets/ingraham_cath_dataset
    designability_csv: /media/scratch/datasets/ingraham_cath_dataset/all_esmfold_native_with_cath_gapped_with_tm_with_seq.csv
    n_random_subset: null

# Evaluation mode
run_codes_sc: true  # run co-design self-consistency eval

# Inverse folding run parameters
num_pdbs: 16  # number of structures to inverse fold
num_seqs_per_pdb: 1  # number of sequences per structure to inverse fold
subset_length_range: [32, 256]
n_traj: 0  # number of trajectories to randomly save
limit_traj_steps: 0  # limit the number of steps we save in a trajectory (evenly spaced)
limit_diff_traj_steps: 0
traj_conect: false

# Sampling hyperparameters
temperature: 0.1
aatype_decoding_order_mode: "random"
num_corrector_steps: 0
corrector_step_ratio: 0.5
timestep_schedule:
  num_steps: 10
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  # Sidechain diffusion parameters
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.4
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}


# Structure prediction model args
struct_pred_cfg:
  model_name: "omegafold"  # ["esmfold", "af2", "omegafold"]
  af2:
    data_dir: /media/scratch/huang_lab/af2  # directory containing "params/" with af2 model params
    num_models: 1  # only 1 model is currently supported
    sample_models: true  # randomly sample models from the ensemble
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024
  omegafold:
    num_pseudo_msa: 15
    mask_rate: 0.12
    num_recycle: 2  # performance saturates after around 10 recycles
    deterministic: true
    subbatch_size: null
    cache_file: /media/scratch/huang_lab/cache/omegafold/omegafold.pt


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
