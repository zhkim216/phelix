# Make positional constraint DataFrame config
# Creates pos constraint DataFrame for ligand pocket or scaffold regions

########### Basic settings #########
debug: false
num_debug_samples: 5

# Input settings
cif_dir: null
pdb_list_file: null
metadata_path: null

# Output settings
output_dir: null
output_prefix: ""

# Save LigandMPNN input CSV
save_ligand_mpnn_csv: false

# Pocket constraint settings
pocket_distance: 8.0
use_pseudocb_for_pocket_annotation: true
constraint_type: pocket  # "pocket", "scaffold", or "both"

######### Data & Transform configurations #########
source_is_designed: true

cif_cfg:
  parse:
    native:
      add_missing_atoms: true
      remove_waters: true
      remove_ccds: []
      fix_ligands_at_symmetry_centers: true
      fix_arginines: true
      convert_mse_to_met: true
      hydrogen_policy: "remove"
      extra_fields: "all"
    designed_samples:
      add_missing_atoms: true
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: false
      hydrogen_policy: "remove"
      extra_fields: null

preprocess_cfg:
  native:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  designed_samples:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true

hydra:
  run:
    dir: /scratch/users/zhkim216/hydra_outputs
