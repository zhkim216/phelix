# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
group: "debug" # Wandb group name
no_wandb: false

# Sampling run settings
ad_ckpt:
exp_name: baseline  # sampling experiment name

cuda: true
num_workers: 10
out_dir: null  # null to save in the model run directory
seed: 0
batch_size: 64
overwrite_out_dir: false

# Evaluation mode
length_bin_size: 75  # bin lengths into intervals of this size for evaluation, starting from 0

# Sampling run parameters
length_range: [75,374]  # inclusive
length_step_size: 5
n_samples_per_length: 10
n_traj_per_length: 0  # number of trajectories to save per length
limit_traj_steps: 0  # limit the number of steps we save in a trajectory (evenly spaced)
traj_conect: false
align_traj_to_last_step: false  # whether to align trajectories to the last step

num_steps: 500
timestep_schedule:
  num_steps: ${num_steps}
  mode: "linear"
  t_start: 0.0
  t_end: 1.0
noise_schedule:
  name: "linear"
churn_cfg:
  s_churn: 0
  s_noise: 1.0
  s_t_min: 0.01
  s_t_max: 50.0
  num_steps: ${num_steps}
s_max_override: null  # if not null, override s_max in interpolant

# Conditioning
# cond_labels: {"designability": "DESIGNABLE"}  # null for unconditional sampling
cond_labels: null

# Autoguidance
autoguidance_cfg:
  use_autoguidance: false
  w: 1.0

# Self-consistency evaluation
sc:
  run_mpnn_sc: true  # run MPNN self-consistency eval
  bin_range: [225, 374]  # only evaluate structures for length bins that start in this range (inclusive)
  max_samples_per_bin: 100  # maximum number of samples to evaluate per length bin

# Dataset for nnTM calculation, path to directory containing PDBs
nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered

# Pairwise TM-scores
pairwise_tm_subsample: 1000  # number of pairs to subsample

# Foldseek clustering analysis
clustering:
  sctm_cutoffs: [0.7, 0.8]
  foldseek_opts:
    alignment_type: 0  # 0 for structure-only
    tmscore_threshold: 0.5
    c: 0.0
    s: 7.5
    cluster_reassign: true

# Secondary structure KL divergence
ss_kld:
  dssp_csv: /media/scratch/datasets/ingraham_cath_dataset/dssp/dssp_length_strict.csv
  bin_size: 10  # size of secondary structure percentage bins
  pseudocount: 0.01  # pseudocount for KL divergence calculation; set arbitrarily to 0.01

# MPNN args
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 1
    number_of_batches: 1
    verbose: false

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"  # ["esmfold", "af2", "omegafold"]
  af2:
    data_dir: /media/scratch/huang_lab/af2  # directory containing "params/" with af2 model params
    num_models: 1  # only 1 model is currently supported
    sample_models: true  # randomly sample models from the ensemble
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024
  omegafold:
    num_pseudo_msa: 15
    mask_rate: 0.12
    num_recycle: 2  # performance saturates after around 10 recycles
    deterministic: true
    subbatch_size: null
    cache_file: /media/scratch/huang_lab/cache/omegafold/omegafold.pt


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
