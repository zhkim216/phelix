# Run settings
seed: 0
batch_size: 16
num_workers: 8

# Parallelization: job array parameters
array_id: null  # Set by Slurm array job. Null means run all.
num_arrays: 1   # Number of total arrays. If array_id is null, this can remain 1.

# Inputs
checkpoint_path: null
pdb_dir: null
pdb_key_list: null  # list of keys to use from the pdb_dir, null to use all .pdb files. Should include extension.
presort_by_length: false  # sort pdbs by sequence length (longest first). Can be helpful for efficiency.
out_dir: null
run_self_consistency_eval: false

# Fixed positions: path to csv with 3 columns: pdb_name, fixed_pos_seq, fixed_pos_scn.
fixed_pos_csv: null  # e.g. 2fyzA, "A1-100,B1-100", "A1-100". If pdb_name is not in the csv, no fixed positions are used.
fixed_pos_verbose: true  # print fixed positions to stdout

# Inverse folding options
aatype_decoding_order_mode: "random"
num_corrector_steps: 0
corrector_step_ratio: 0.5
seq_only: false  # true to not pack sidechains during sampling
num_steps: 100
num_seqs_per_pdb: 1
temperature: 0.1
repack_last: true  # after design, repack the final sequence obtained
repack_every_step: false  # repack after every step
timestep_schedule:
  num_steps: null  # will be filled in by num_steps
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.5
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"
  af2:
    data_dir: /media/scratch/huang_lab/af2
    num_models: 1
    sample_models: true
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
