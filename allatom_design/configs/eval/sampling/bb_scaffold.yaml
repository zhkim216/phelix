# Wandb configuration
wandb:
  no_wandb: false  # Disable wandb logging
  project: "allatom_design"  # Wandb project name
  wandb_id: "richardshuai"  # Wandb username
  group: "debug" # Wandb group name

# Outputs
exp_name: null  # experiment name; used for wandb and output directory
base_out_dir: test_draw_bb_samples  # outputs will be saved to base_out_dir/exp_name

# Sampling run settings
checkpoint_path: /media/scratch/huang_lab/allatom_design/allatom_design/u1_a7/checkpoints/ema/ad-step1625000-epoch2008-ema0.99.ckpt
seed: 0

input_cfg:
  pdb_dir: null
  pdb_name_list: null  # list of pdb_names to use from the pdb_dir, null to use all .pdb files
  pdb_name_ext: ""  # if pdb_name_list does not have extensions, add this extension
  subset_length_range: null # only evaluate on sequences within this length range
  presort_by_length: false  # sort pdb keys by sequence length, potentially for efficiency
  n_subsample: null  # randomly sample this many pdb keys, null to use all

# Backbone sampling parameters
bb_gen_cfg:
  ckpt_path: ${checkpoint_path}
  sampling_cfg: allatom_design/configs/bb_gen/bb_sampling_base.yaml
  overrides:
    num_steps: 500

# Self-consistency evaluation
sc:
  run_mpnn_sc: true  # run MPNN self-consistency eval
  bin_range: [225, 374]  # only evaluate structures for length bins that start in this range (inclusive)
  max_samples_per_bin: 100  # maximum number of samples to evaluate per length bin

# Dataset for nnTM calculation, path to directory containing PDBs
# nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered
nntm_dataset: null

# Pairwise TM-scores
pairwise_tm_subsample: 1000  # number of pairs to subsample

# Foldseek clustering analysis
clustering:
  sctm_cutoffs: [0.7, 0.8]
  foldseek_opts:
    alignment_type: 0  # 0 for structure-only
    tmscore_threshold: 0.5
    c: 0.0
    s: 7.5
    cluster_reassign: true

# Secondary structure KL divergence
ss_kld:
  dssp_csv: /media/scratch/datasets/ingraham_cath_dataset/dssp/dssp_length_strict.csv
  bin_size: 10  # size of secondary structure percentage bins
  pseudocount: 0.01  # pseudocount for KL divergence calculation; set arbitrarily to 0.01

# MPNN args - Update to match new structure
seq_des_cfg:
  model_name: "proteinmpnn"  # ["proteinmpnn", "fampnn"]
  proteinmpnn:
    mpnn_cfg: allatom_design/configs/seq_des/proteinmpnn.yaml
    mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
    overrides:
      batch_size: 1
      number_of_batches: 1
      verbose: false
  fampnn:
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: /media/scratch/huang_lab/allatom_design/allatom_design/c2_aasd2/post_hoc_ema_ckpts/ema-step300000-std0.220.ckpt
    overrides:
      batch_size: 16
      num_seqs_per_pdb: 1
      num_steps: 50
      noise_labels: 0.0

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"
  base_cfg: allatom_design/configs/struct_pred/struct_pred_base.yaml
  # overrides to base config
  af2:
    data_dir: /media/scratch/huang_lab/af2
  esmfold:
    max_tokens_per_batch: 1024



hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
