# Sherlock interactive smoke config for Mg denovo RASA N100 lc_seq_des_multi.
# Run from /home/users/zhkim216/code/elix:
#   python3 allatom_design/eval/sampling/lc_seq_des_multi.py --config-name debug_lc_seq_des_multi_mgproto

defaults:
  - lc_seq_des_multi
  - _self_

wandb:
  no_wandb: true
  project: "eval_ligand_seq_des"
  wandb_id: "zhkim216"
  group: "mg_denovo_rasa_n100_debug"

debug: false
num_debug_samples: 1
seed: 0
num_workers: 8
protein_only: false
run_seq_des: true

exp_name: debug_mg_denovo_rasa_n100_mg_proto_gpt_step2500_no_af3
base_out_dir: /scratch/users/zhkim216/out_dir/eval_ligand_seq_des

seq_des_cfg:
  denoiser_train_dir: /scratch/users/zhkim216/out_dir/ligand_seq_des/mg_proto_gpt
  ckpt_cfg:
    start_step: 2500
    end_step: 2500
    eval_every_n_ckpts: 1
    eval_last_ckpt: false
    use_ema: true
  atom_mpnn:
    sampling_cfg: /home/users/zhkim216/code/elix/allatom_design/configs/seq_des/lc_atom_mpnn_inference.yaml
    overrides:
      batch_size: 1
      num_seqs_per_pdb: 1
      use_potts_sampling: true
      potts_sampling_cfg:
        potts_sweeps: 50
        lcp_expand_edge_idx_fix: true
        rejection_step: false

guidance_cfg:
  enabled: false

sampling_inputs_csv: /scratch/users/zhkim216/datasets/val_cifs/mg_denovo_val_cifs_test/sampling_inputs_mg_denovo_rasa_le0p25_uniform_bins_N100.csv
pos_constraint_csv: null

redesign_cfg:
  use_native_seq: false
  native_cif_dir: null

pocket_cfg:
  pocket_distance_for_docking_metrics: 5.0
  n_min_ligand_atoms_for_seq_recovery: 1

input_sample_is_all_atom: true
input_sample_is_designed: true
load_from_cache: false

pdb_cfg:
  pdb_dir: /scratch/users/zhkim216/datasets/val_cifs/mg_denovo_val_cifs_test/cifs
  pdb_name_list: /scratch/users/zhkim216/datasets/val_cifs/mg_denovo_val_cifs_test/mg_denovo_rasa_le0p25_uniform_bins_N100_smoke2.txt
  pdb_name_ext: ".cif"
  recursive: false
  split_by_subfolder: false
  sample_indices: null
  sample_lengths: null
  array_id: 0
  num_arrays: 1

cif_cfg:
  save:
    include_bonds: false

featurizer_cfg:
  design:
    residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks_cached_residue_data

struct_pred_cfg:
  evaluate_self_consistency: false
  evaluate_docking_consistency: false
  calculate_metrics_only: false
  af3:
    runner_path: /home/users/zhkim216/code/elix/alphafold3/src/alphafold3/run_alphafold.py
    inference_config:
      base:
        flash_attention_implementation: "triton"
      ss:
        num_recycles: 1
        num_diffusion_samples: 1

hydra:
  run:
    dir: /scratch/users/zhkim216/hydra_outputs/eval_mg_denovo_rasa_n100_debug
