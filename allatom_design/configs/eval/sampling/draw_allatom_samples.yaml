ad_ckpt:
sd_ckpt:

cuda: true
num_workers: 10
out_dir: null  # null to save in the atom denoiser model run directory
exp_name: baseline  # sampling experiment name
overwrite_out_dir: true  # if true, delete existing output directory
seed: 0
batch_size: 64

# Evaluation mode
run_mpnn_sc: true  # run MPNN self-consistency eval
run_codes_sc: false  # run co-design self-consistency eval

# Sampling run parameters
# length_range: [63,63]
length_range: [64,128]
length_step_size: 4
n_samples_per_length: 2
n_traj_per_length: 1  # number of trajectories to save per length
limit_traj_steps: 0  # limit the number of steps we save in a trajectory (evenly spaced)
traj_conect: false
align_traj_to_last_step: false  # whether to align trajectories to the last step

# Sampling hyperparameters
ad:
  num_steps: 500
  ca:
    timestep_schedule:
      num_steps: ${ad.num_steps}
      mode: "linear"
      t_start: 0.0
      t_end: 1.0
    noise_schedule:
      name: "linear"
    churn_cfg:
      s_churn: 0
      s_noise: 1.0
      s_t_min: 0.01
      s_t_max: 50.0
      num_steps: ${ad.num_steps}
  nco:
    timestep_schedule:
      num_steps: ${ad.num_steps}
      mode: "linear"
      t_start: 0.0
      t_end: 1.0
    noise_schedule:
      name: "linear"
    churn_cfg:
      s_churn: 0
      s_noise: 1.0
      s_t_min: 0.01
      s_t_max: 50.0
      num_steps: ${ad.num_steps}

sd:
  seq:
    aatype_decoding_order_mode: "random"
    num_steps: 2
    timestep_schedule:
      num_steps: ${sd.seq.num_steps}
      mode: "linear"
      t_start: 0.0
      t_end: 1.0
  scd:
    num_steps: 50
    timestep_schedule:
      num_steps: ${sd.scd.num_steps}
      mode: "linear"
      t_start: 0.0
      t_end: 1.0
    noise_schedule:
      name: "step_scale"
      c: 1.4
    churn_cfg:
      s_churn: 0
      s_noise: 1.0
      s_t_min: 0.01
      s_t_max: 50.0
      num_steps: ${sd.scd.num_steps}

cond_labels: null

# MPNN args
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 8
    number_of_batches: 1
    verbose: false

# Dataset for nnTM calculation, path to directory containing PDBs
nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
