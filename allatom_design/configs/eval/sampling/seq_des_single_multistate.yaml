# Run settings
seed: 0
num_workers: 8  # for dataloading

# Inputs
ckpt_path: null
out_dir: null

# PDB file inputs
pdb_dir: null

# Positional contraints
fixed_pos_seq: # comma-separated, chain + residue index specification, e.g. "A1-100,B1-100"
fixed_pos_scn: # null for no provided sidechains, otherwise should be subset of fixed_pos_seq, e.g. "A1-100"
fixed_pos_override_seq:  # overrides sequence in input pdb at certain positions and conditions on it. Comma-separated, "<chain + residue index>:<desired aatype in 1-letter code format>", e.g. "A26:A,A27:L"
pos_restrict_aatype:   # restricts allowed aatypes at certain positions. Comma-separated, "<chain + residue index>:<allowed aatypes in 1-letter code format>", e.g. "A26:AVG,A27:VG"}

# PDB file processing
pdb_processing_cfg:
  num_workers: ${num_workers}

  # if we have to convert PDBs to mmCIFs
  pdb_to_cif_conversion_cfg:
    assign_label_seq_id: false  # if true, automatically assign label_seq_id by aligning the sequence in the model with the sequence in the SEQRES

  # CCD
  ccd_cfg:
    use_redis: true

    # If using redis (fast)
    ccd_rdb_path: allatom_design/data/ccd.rdb  # path to the chemical component dictionary rdb file

    # If redis host is null, use this path instead to load the chemical component dictionary (can be much slower)
    ccd_pkl_path: /media/scratch/datasets/boltz/ccd.pkl


# Sampling config
run_self_consistency_eval: false
sampling_cfg_overrides:
  batch_size: 16
  num_seqs_per_pdb: 16  # number of sequences to sample per pdb
  num_steps: 50
  noise_labels: null
  num_workers: ${num_workers}
  tied_across_batch: true

# Sampling config
seq_des_cfg:
  model_name: "atom_mpnn"
  atom_mpnn:
    ckpt_path: ${ckpt_path}
    sampling_cfg: allatom_design/configs/seq_des/atom_mpnn_inference.yaml
    overrides: ${sampling_cfg_overrides}

# Structure prediction model args
struct_pred_cfg:
  model_name: "boltz1"
  base_cfg: allatom_design/configs/struct_pred/struct_pred_base.yaml
  # overrides to base config
  boltz1:
    checkpoint: /media/scratch/huang_lab/model_params/boltz1/boltz1_conf.ckpt
  esmfold:
    max_tokens_per_batch: 1024

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
