# Run settings
seed: 0

# Inputs
checkpoint_path: null
out_dir: null

pdb_path: null
fixed_pos_seq: # comma-separated, chain + residue index specification, e.g. "A1-100,B1-100"
fixed_pos_scn: # null for no provided sidechains, otherwise should be subset of fixed_pos_seq, e.g. "A1-100"
fixed_pos_override_seq:  # overrides sequence in input pdb at certain positions and conditions on it. Comma-separated, "<chain + residue index>:<desired aatype in 1-letter code format>", e.g. "A26:A,A27:L"
pos_restrict_aatype:   # restricts allowed aatypes at certain positions. Comma-separated, "<chain + residue index>:<allowed aatypes in 1-letter code format>", e.g. "A26:AVG,A27:VG"}

run_self_consistency_eval: false

sampling_cfg_overrides:
  batch_size: 16
  num_seqs_per_pdb: 16  # number of sequences to sample per pdb
  num_steps: 50
  noise_labels: 0.0

# Sampling config
seq_des_cfg:
  model_name: "fampnn"
  fampnn:
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: /media/scratch/huang_lab/allatom_design/allatom_design/c6_aasd1/checkpoints/ema/sd-step120000-epoch344-ema0.99.ckpt
    overrides: ${sampling_cfg_overrides}

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"
  base_cfg: allatom_design/configs/struct_pred/struct_pred_base.yaml
  # overrides to base config
  af2:
    data_dir: /media/scratch/huang_lab/af2
  esmfold:
    max_tokens_per_batch: 1024

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
