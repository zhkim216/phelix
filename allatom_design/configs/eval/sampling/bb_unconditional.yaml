# Wandb configuration
wandb:
  no_wandb: false  # Disable wandb logging
  project: "allatom_design"  # Wandb project name
  wandb_id: "richardshuai"  # Wandb username
  group: "debug" # Wandb group name

# Outputs
exp_name: null  # experiment name; used for wandb and output directory
base_out_dir: test_bb_unconditional  # outputs will be saved to base_out_dir/exp_name

# Sampling run settings
checkpoint_path: /media/scratch/huang_lab/allatom_design/allatom_design/u1_a7/checkpoints/ema/ad-step1625000-epoch2008-ema0.99.ckpt
seed: 0
compute_self_consistency: true

# Length parameters
length_range: [75,224]  # inclusive
length_step_size: 5
n_samples_per_length: 10

length_bin_size: 75  # bin lengths into intervals of this size for evaluation, starting from 0

# Backbone sampling parameters
bb_gen_cfg:
  ckpt_path: ${checkpoint_path}
  sampling_cfg: allatom_design/configs/bb_gen/bb_sampling_base.yaml
  overrides:
    num_steps: 500

save_traj:
  enabled: false
  n_traj_per_length: 1  # number of trajectories to save per length
  limit_traj_steps: 50  # limit the number of steps we save in a trajectory (evenly spaced)
  traj_conect: false
  align_traj_to_last_step: false  # whether to align trajectories to the last step

# Dataset for nnTM calculation, path to directory containing PDBs
# nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered
nntm_dataset: null

# Diversity evaluation config
diversity_eval:
  # Pairwise TM-scores
  pairwise_tm_subsample: 2000  # number of pairs to subsample

  # Foldseek clustering analysis
  clustering:
    sctm_cutoffs: [0.7, 0.8]
    foldseek_opts:
      alignment_type: 0  # 0 for structure-only
      tmscore_threshold: 0.5
      c: 0.0
      s: 7.5
      cluster_reassign: true

# Sequence design config
seq_des_cfg:
  # MPNN args
  model_name: "proteinmpnn"  # ["proteinmpnn", "fampnn"]
  proteinmpnn:
    mpnn_cfg: allatom_design/configs/seq_des/proteinmpnn.yaml
    mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
    overrides:
      # for proteinmpnn, num seqs per structure will be batch_size * number_of_batches
      batch_size: 1
      number_of_batches: 1
      verbose: false
  fampnn:
    # FAMPNN args
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: /media/scratch/huang_lab/allatom_design/allatom_design/c6_aasd1/checkpoints/ema/sd-step120000-epoch344-ema0.99.ckpt
    overrides:
      batch_size: 16
      num_seqs_per_pdb: 1
      num_steps: 50
      noise_labels: 0.0

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"
  base_cfg: allatom_design/configs/struct_pred/struct_pred_base.yaml
  # overrides to base config
  af2:
    data_dir: /media/scratch/huang_lab/af2
  esmfold:
    max_tokens_per_batch: 1024

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
