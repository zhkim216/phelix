# Wandb configuration
wandb:
  no_wandb: false  # Disable wandb logging
  project: "allatom_design"  # Wandb project name
  wandb_id: "richardshuai"  # Wandb username
  group: "debug" # Wandb group name

# Outputs
exp_name: null  # experiment name; used for wandb and output directory
base_out_dir: test_bb_partial_diffusion  # outputs will be saved to base_out_dir/exp_name

# Sampling run settings
ckpt_path: /media/scratch/huang_lab/allatom_design/allatom_design/u1_a7/checkpoints/ema/ad-step1625000-epoch2008-ema0.99.ckpt
num_workers: 8
seed: 0

# PDB file inputs
pdb_path:
n_samples_per_pdb: 16

# PDB file processing
pdb_processing_cfg:
  num_workers: ${num_workers}

  # if we have to convert PDBs to mmCIFs
  pdb_to_cif_conversion_cfg:
    assign_label_seq_id: false  # if true, automatically assign label_seq_id by aligning the sequence in the model with the sequence in the SEQRES

  # CCD
  ccd_cfg:
    # If using redis
    use_redis: true

    # If using redis (fast)
    ccd_rdb_path: allatom_design/data/ccd.rdb  # path to the chemical component dictionary rdb file

    # If redis host is null, use this path instead to load the chemical component dictionary (can be much slower)
    ccd_pkl_path: /media/scratch/datasets/boltz/ccd.pkl


# Backbone sampling parameters
bb_gen_cfg:
  ckpt_path: ${ckpt_path}
  sampling_cfg: allatom_design/configs/bb_gen/bb_sampling_base.yaml
  overrides:
    timestep_schedule:
      t_start: 0.65
      t_end: 1.0
    num_steps: 250

save_traj:
  enabled: false
  n_traj_per_length: 1  # number of trajectories to save per length
  limit_traj_steps: 50  # limit the number of steps we save in a trajectory (evenly spaced)
  traj_conect: false
  align_traj_to_last_step: false  # whether to align trajectories to the last step


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
