sd_ckpt:

seed: 0

# Inputs
checkpoint_path: null  # path to the checkpoint to use for sampling
out_dir: null  # null to save in the model run directory

input_cfg:
  pdb_dir: null
  pdb_key_list: null  # list of keys to use from the pdb_dir, null to use all .pdb files
  pdb_key_ext: ""  # if pdb_key_list does not have extensions, add this extension
  subset_length_range: null # only evaluate on sequences within this length range
  presort_by_length: false  # sort pdb keys by sequence length, potentially for efficiency
  n_subsample: null  # randomly sample this many pdb keys, null to use all

# Sidechain packing run parameters
n_traj: 0  # number of trajectories to randomly save
limit_diff_traj_steps: 20  # limit the number of steps we save in the sidechain diffusion trajectory (evenly spaced)

sampling_cfg_overrides:
  batch_size: 32
  num_seqs_per_pdb: 1  # number of sequences to sample per pdb
  noise_labels: 0.0

# Sampling config
seq_des_cfg:
  model_name: "fampnn"
  fampnn:
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: ${checkpoint_path}
    overrides: ${sampling_cfg_overrides}

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
