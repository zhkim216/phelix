# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
group: "debug" # Wandb group name
no_wandb: false

# Paths
fpd_embeddings_dir: /scratch/users/rshuai/datasets/ingraham_cath_dataset/fpd_embeddings
use_mpnn: false
use_esm3: true
pct_subsample_train: 0.1
pct_subsample_eval: 1.0

# Run options
exp_name: fpd_test  # sampling experiment name
out_dir: null
seed: 0
batch_size: 64

# Backbone generation config
model_ckpt: null

# Sampling parameters
num_steps: 500
timestep_schedule:
  num_steps: ${num_steps}
  mode: "linear"
  t_start: 0.0
  t_end: 1.0
noise_schedule:
  name: "linear"
churn_cfg:
  s_churn: 0
  s_noise: 1.0
  s_t_min: 0.01
  s_t_max: 50.0
  num_steps: ${num_steps}

# Conditioning
# cond_labels: {"designability": "DESIGNABLE"}  # null for unconditional sampling
cond_labels: null

# Autoguidance
autoguidance_cfg:
  use_autoguidance: false
  w: 1.0

# Embedding model configs
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 1
    number_of_batches: 1
    verbose: false

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
