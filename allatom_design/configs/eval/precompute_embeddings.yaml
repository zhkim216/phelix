seed: 0
subsample_n: 100000  # subsample to at most n keys per phase

compute_mpnn: true
compute_esm3: true

# PDB key files for each phase; null to skip
use_precomputed_key_files: false  # true to use precomputed key files in out_dir/precomputed_{phase}_pdb_keys.list
train_pdb_key_file: /scratch/users/rshuai/datasets/ingraham_cath_dataset/train_pdb_keys.list
eval_pdb_key_file: /scratch/users/rshuai/datasets/ingraham_cath_dataset/eval_pdb_keys.list
eval2_pdb_key_file: /scratch/users/rshuai/datasets/ingraham_cath_dataset/eval2_pdb_keys.list

pdbs_dir: /scratch/users/rshuai/datasets/ingraham_cath_dataset/pdb_store_with_ext
out_dir: /scratch/users/rshuai/datasets/ingraham_cath_dataset/fpd_embeddings
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 1
    number_of_batches: 1
    verbose: false

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
