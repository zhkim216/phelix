base_out_dir: out_dir/plot_potts_params/sd3_a9_S/spd0_a4_cfg2
comparisons: ["sd3_a9_S_spd0_a4_cfg2_t0.7_nc1", "sd3_a9_S_spd0_a4_cfg2_t0.7_nc16"]
num_workers: 1
contact_map_cutoff: 8.0

model_csvs:
  - model_name: "sd3_a9_S_spd0_a4_cfg2_t0.7_nc1"
    base_dir: /home/rshuai/research/huang_lab/allatom-design/out_dir/sd3_a9_S/seq_des_multi_ensemble/spd0_a4_cfg2/t0.7_nc1/potts_params
    plot_name: "sd3_a9_S_spd0_a4_cfg2_t0.7_nc1"
  - model_name: "sd3_a9_S_spd0_a4_cfg2_t0.7_nc16"
    base_dir: /home/rshuai/research/huang_lab/allatom-design/out_dir/sd3_a9_S/seq_des_multi_ensemble/spd0_a4_cfg2/t0.7_nc16/potts_params
    plot_name: "sd3_a9_S_spd0_a4_cfg2_t0.7_nc16"


# PDB file inputs
input_cfg:
  pdb_dir: null
  pdb_name_list: null
  pdb_name_ext: ""  # if pdb_name_list does not have extensions, add this extension
  n_subsample: null  # randomly sample this many pdb keys, null to use all

# PDB file processing
pdb_processing_cfg:
  num_workers: ${num_workers}

  # if we have to convert PDBs to mmCIFs
  pdb_to_cif_conversion_cfg:
    assign_label_seq_id: false  # if true, automatically assign label_seq_id by aligning the sequence in the model with the sequence in the SEQRES

  # CCD
  ccd_cfg:
    use_redis: true

    # If using redis (fast)
    ccd_rdb_path: allatom_design/data/ccd.rdb  # path to the chemical component dictionary rdb file

    # If redis host is null, use this path instead to load the chemical component dictionary (can be much slower)
    ccd_pkl_path: /media/scratch/datasets/boltz/ccd.pkl

# Tokenizer and featurizer configs
data_cfg:
  atoms_per_window_queries: 32
  num_bins: 64

  tokenizer:
    _target_: allatom_design.data.tokenize.boltz.BoltzTokenizer

  # Featurizer for prefeaturizing inputs
  featurizer:
    _target_: allatom_design.data.feature.seq_des_featurizer.SequenceDesignFeaturizer


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
