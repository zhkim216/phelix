    models: ["cc83_epoch1000", "cc83_epoch2616"]
  - name: "cc84_epoch1000_vs_latest"
    models: ["cc84_epoch1000", "cc84_epoch2431"]
  - name: "cc85_epoch1000_vs_latest"
    models: ["cc85_epoch1000", "cc85_epoch2541"]
  - name: "cc86_epoch1000_vs_latest"
    models: ["cc86_epoch1000", "cc86_epoch1586"]

