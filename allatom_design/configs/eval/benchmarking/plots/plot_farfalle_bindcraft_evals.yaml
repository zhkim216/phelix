  - name: "epoch1000"
    models: ["cc74_epoch1000", "cc75_epoch1000", "cc78_epoch1000", "cc79_epoch1000", "cc80_epoch1000", "cc81_epoch1000", "cc83_epoch1000", "cc84_epoch1000", "cc85_epoch1000", "cc86_epoch1000"]

