# Test set configs

base_out_dir: out_dir/compare_self_consistency/btc/

comparisons:
  # y-axis model, x-axis model
  - models: ["baseline_boltz1", "sd3_a10_test_ens0_idx2_boltz1"]
    struct_model_name: "Boltz-1x"
  - models: ["baseline_esmfold", "sd3_a10_test_ens0_idx2_esmfold"]
    struct_model_name: "ESMFold"
  - models: ["ligandmpnn_boltz1", "sd3_a10_test_ens0_idx2_boltz1"]
    struct_model_name: "Boltz-1x"
  - models: ["ligandmpnn_esmfold", "sd3_a10_test_ens0_idx2_esmfold"]
    struct_model_name: "ESMFold"
  - models: ["ligandmpnn_esmfold", "baseline_esmfold"]
    struct_model_name: "ESMFold"

model_csvs:
  ### test set ###
  # Baselines
  - model_name: "baseline_boltz1"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/ensemble_design/sd3_a10_test_ens1/sd3_a10_test_ens1_idx0_boltz1/self_consistency_metrics.csv"
    plot_name: "Baseline"
  - model_name: "baseline_esmfold"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/ensemble_design/sd3_a10_test_ens1/sd3_a10_test_ens1_idx0_esmfold/self_consistency_metrics.csv"
    plot_name: "Baseline"

  - model_name: "ligandmpnn_boltz1"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/boltz_test_cifs_evals/protein_monomer_32_512_no_ligand/ligandmpnn/ligandmpnn_protein_monomer_32_512_no_ligand_boltz1/sc_metrics.csv"
    plot_name: "LigandMPNN baseline"

  - model_name: "ligandmpnn_esmfold"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/boltz_test_cifs_evals/protein_monomer_32_512_no_ligand/ligandmpnn/ligandmpnn_protein_monomer_32_512_no_ligand_esmfold/sc_metrics.csv"
    plot_name: "LigandMPNN baseline"

  # boltz1
  - model_name: "sd3_a10_test_ens0_idx2_boltz1"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/ensemble_design/sd3_a10_test_ens0/sd3_a10_test_ens0_idx2_boltz1/self_consistency_metrics.csv"
    plot_name: "T=0.70"

  # esmfold
  - model_name: "sd3_a10_test_ens0_idx2_esmfold"
    csv: "/media/scratch/huang_lab/allatom_design/allatom_design/ensemble_design/sd3_a10_test_ens0/sd3_a10_test_ens0_idx2_esmfold/self_consistency_metrics.csv"
    plot_name: "T=0.70"

# Which models that need to use subset_pdb_names
# subset_pdb_names: /media/scratch/datasets/boltz_val_cifs/pdb_name_lists/protein_monomer_32_256_no_ligand.txt
subset_pdb_names: null

# Add lengths
length_csv: null
length_legend_range: null

# Add secondary structure annotations
sse_pt: null

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
