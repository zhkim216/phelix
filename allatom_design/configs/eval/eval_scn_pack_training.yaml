# Wandb configuration
wandb:
  no_wandb: false  # Disable wandb logging
  project: "allatom_design"  # Wandb project name
  wandb_id: "richardshuai"  # Wandb username
  group: "debug" # Wandb group name

# Outputs
exp_name: null  # experiment name; used for wandb and output directory
base_out_dir: ${denoiser_train_dir}/eval_scn_pack_training  # outputs will be saved to base_out_dir/exp_name

# Run settings
seed: 0
start_step: 0  # start evaluation after this epoch, 0 or null to start from the beginning
end_step: null  # end evaluation after this step (inclusive), null to evaluate until the end
eval_every_n_ckpts: 1  # evaluate every n checkpoints, for speed

# Inputs
input_cfg:
  pdb_dir: null
  pdb_name_list: null  # list of pdb_names to use from the pdb_dir, null to use all .pdb files
  pdb_name_ext: ""  # if pdb_name_list does not have extensions, add this extension
  subset_length_range: null # only evaluate on sequences within this length range
  presort_by_length: false  # sort pdb keys by sequence length, potentially for efficiency
  n_subsample: null  # randomly sample this many pdb keys, null to use all

# Denoiser options
denoiser_train_dir:

num_steps_list: [1, 50]
sampling_cfg_overrides:
  batch_size: 64
  num_seqs_per_pdb: 1  # number of sequences to sample per pdb
  scn_diffusion:
    num_steps: null  # filled in by num_steps_list
    noise_schedule:
      name: "step_scale"
      c: 1.0  # we don't use low temperature sampling for evaluation

# Sampling config
seq_des_cfg:
  model_name: "fampnn"
  fampnn:
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: null  # overridden with training checkpoint paths
    overrides: ${sampling_cfg_overrides}

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
