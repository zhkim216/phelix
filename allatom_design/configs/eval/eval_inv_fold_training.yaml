# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
exp_name: null # Wandb exp name
group: "debug" # Wandb group name

# Run settings
no_wandb: false  # Disable wandb logging
seed: 0
start_epoch: 0  # start evaluation after this epoch, 0 or null to start from the beginning
eval_every_n_ckpts: 1  # evaluate every n checkpoints, for speed
batch_size: 64
num_workers: 10

# Evals to run
run_seq_recovery: true  # compute sequence recovery
run_codes_sc: true  # run self-consistency eval with inverse-folded sequences

# Denoiser options
denoiser_train_dir:
out_dir: ${denoiser_train_dir}/eval_inv_fold_training

# Data options for overriding denoiser config (null values default to denoiser config)
data:
    pdb_path: /media/scratch/datasets/ingraham_cath_dataset
    designability_csv: /media/scratch/datasets/ingraham_cath_dataset/all_esmfold_native_with_cath_gapped_with_tm_with_seq.csv
    n_random_subset: null

subset_length_range: [64, 256]  # only evaluate on sequences within this length range

# Inverse folding options
aatype_decoding_order_mode: "random"
num_steps_list: [1, 20, 100]  # number of denoising steps for inverse folding
timestep_schedule:
  num_steps: null  # will be filled in by num_steps_list
  mode: "linear"
  t_start: 0.0
  t_end: 1.0

scn_diffusion:
  # Sidechain diffusion parameters
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.4
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}

# Co-design self-consistency eval options
num_codes_sc_samples: 8

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
