# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
exp_name: null  # Wandb exp name
group: "eval_bb_gen_debug" # Wandb group name

# Run settings
no_wandb: false  # Disable wandb logging
seed: 0
start_step: 0  # start evaluation after this epoch, 0 or null to start from the beginning
eval_every_n_ckpts: 1  # evaluate every n checkpoints, for speed
batch_size: 32
num_workers: 8

compute_diversity_metrics: true  # whether to compute pairwise TM and clustering metrics

# Denoiser options
denoiser_train_dir:
out_dir: ${denoiser_train_dir}/eval_bb_gen_training

# Sampling run parameters
length_range: [64, 128]
length_step_size: 8
n_samples_per_length: 2

# Backbone generation options
cond_labels: null

num_steps: 500
timestep_schedule:
  num_steps: ${num_steps}
  mode: "linear"
  t_start: 0.0
  t_end: 1.0
noise_schedule:
  name: "linear"
churn_cfg:
  s_churn: 0
  s_noise: 1.0
  s_t_min: 0.01
  s_t_max: 50.0
  num_steps: ${num_steps}

autoguidance_cfg:
  use_autoguidance: false
  w: 1.0

seq_des_cfg:
  # MPNN args
  model_name: "proteinmpnn"  # ["proteinmpnn", "fampnn"]
  proteinmpnn:
    mpnn_cfg: allatom_design/configs/seq_des/proteinmpnn.yaml
    mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
    overrides:
      # for proteinmpnn, num seqs per structure will be batch_size * number_of_batches
      batch_size: 1
      number_of_batches: 1
      verbose: false
  fampnn:
    # FAMPNN args
    fampnn_cfg: allatom_design/configs/seq_des/fampnn_inference.yaml
    fampnn_ckpt: /media/scratch/huang_lab/allatom_design/allatom_design/c2_aasd2/post_hoc_ema_ckpts/ema-step300000-std0.220.ckpt
    overrides:
      batch_size: 16
      num_seqs_per_pdb: 1
      num_steps: 50
      noise_labels: 0.0


# Pairwise TM-scores
pairwise_tm_subsample: 2000  # number of pairs to subsample

# Foldseek clustering analysis
clustering:
  sctm_cutoffs: [0.7, 0.8]
  foldseek_opts:
    alignment_type: 0  # 0 for structure-only
    tmscore_threshold: 0.5
    c: 0.0
    s: 7.5
    cluster_reassign: true

# Structure prediction model args
struct_pred_cfg:
  model_name: "esmfold"  # ["esmfold", "af2", "omegafold"]
  af2:
    data_dir: /media/scratch/huang_lab/af2  # directory containing "params/" with af2 model params
    num_models: 1  # only 1 model is currently supported
    sample_models: true  # randomly sample models from the ensemble
    num_recycles: 3
    use_multimer: false
  esmfold:
    max_tokens_per_batch: 1024
  omegafold:
    num_pseudo_msa: 15
    mask_rate: 0.12
    num_recycle: 2  # performance saturates after around 10 recycles
    deterministic: true
    subbatch_size: null
    cache_file: /media/scratch/huang_lab/cache/omegafold/omegafold.pt

# Dataset for nnTM calculation, path to directory containing PDBs, null to skip nnTM calculation
# nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered
nntm_dataset: null

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
