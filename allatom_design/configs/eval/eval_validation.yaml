# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
exp_name: null # Wandb exp name
group: "debug" # Wandb group name
no_wandb: false

# Inputs
sd_ckpt:

num_workers: 10
out_dir: null  # null to save in the model run directory
overwrite_out_dir: true  # if true, delete existing output directory
seed: 0
batch_size: 64

# Data options for overriding denoiser config (null values default to denoiser config)
data:
    designability_csv: null
    pdb_path: null
    subset_length_range: [64, 1024]

trainer:
  strategy: ddp_find_unused_parameters_true  # use "ddp_find_unused_parameters_true" if expecting unused parameters in model
  max_epochs: 100000
  accumulate_grad_batches: 1
  detect_anomaly: false  # Slower; enable for debugging nans in gradients
  gradient_clip_val: 0.0
  precision: "bf16-mixed"  # bf16-mixed  TODO: compare against fp32 as baseline
  check_val_every_n_epoch: 50  # How often to run validation


# Sidechain diffusion parameters
scn_diffusion:
  num_steps: 50
  timestep_schedule:
    num_steps: ${scn_diffusion.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
  noise_schedule:
    name: "step_scale"
    c: 1.5
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${scn_diffusion.num_steps}


hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
