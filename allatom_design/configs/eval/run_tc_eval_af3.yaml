# Template-conditioned docking consistency evaluation config for AF3
# For evaluating pre-designed samples (e.g. caliby/lcaliby-designed structures)

# Wandb settings
wandb:
  no_wandb: true  # Disable wandb logging
  project: "ligand_seq_des"
  wandb_id: "zhkim216"  # Wandb username
  group: null

# Basic settings
debug: true
num_debug_samples: 2
seed: 0
protein_only: false

# Outputs
exp_name: eval_exp16_cfg0_lmpnnval_af3_tc
base_out_dir: base_out_dir: /scratch/users/zhkim216/out_dir/debug_eval_ligand_seq_des

# Configurations for getting designed sample paths
pdb_cfg:
  pdb_dir: /scratch/users/zhkim216/out_dir/eval_ligand_seq_des/eval_exp18_cfg3_rfd3val_af3/step_62500_epoch_39/samples
  pdb_name_list: null
  pdb_name_ext: ".cif"
  n_subsample: null
  # Recursive search (not needed for flat directories)
  recursive: false
  split_by_subfolder: false
  # Sample index filtering
  sample_indices: null
  # Slurm array job parameters (set via CLI override in sbatch)
  array_id: null
  num_arrays: null

# Pocket configuration
pocket_cfg:
  pocket_distance_for_metrics: 6.0

######### Data & Transform configurations #########
# Configurations for cif files
cif_cfg:
  parse:
    designed_samples:
      add_missing_atoms: true #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: false
      hydrogen_policy: "remove"
      extra_fields: null
    af3_predictions:
      add_missing_atoms: true #! For charge annotation and is_backbone_atom annotation
      remove_waters: false
      remove_ccds: []
      fix_ligands_at_symmetry_centers: false
      fix_arginines: false
      convert_mse_to_met: false
      hydrogen_policy: "remove"
      extra_fields: null
  save:
    date: "1959-01-07" #! Young-Ae Lee's birthday
    include_entity_poly: True
    include_entity_nonpoly: True
    include_nan_coords: False #! designed structures should not have nan coords
    include_bonds: True
    extra_fields: "all"
    exclude_field_keys: ["token_id", "is_ligand_pocket"]
    extra_categories:
      pdbx_audit_revision_history:
        ordinal: [1]
        revision_id: [1]
        revision_date: ["1959-01-07"]
        major_revision: [1]
        minor_revision: [0]
        revision_description: ["Dummy date for template-conditioning AF3"]

preprocess_cfg:
  designed_samples:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: true
    remove_terminal_oxygen_nucleic_acid: true
  af3_predictions:
    undesired_res_names: []
    b_factor_min: null
    b_factor_max: null
    min_residues_for_polymers: 0
    remove_terminal_oxygen_protein: false #! AF3 prediction CIF files have OXT atoms, so need to preserve them
    remove_terminal_oxygen_nucleic_acid: false

featurizer_cfg:
  prepare_designed_samples:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true
  prepare_af3_predictions:
    max_tokens: null
    max_atoms: null
    remove_keys: []
    remove_unresolved_tokens: true

######### Structure prediction model configuration (AF3) #########
struct_pred_cfg:
  model_name: "af3"
  evaluate_docking_consistency: true
  calculate_metrics_only: false
  af3:
    runner_path: /home/users/zhkim216/code/allatom-design/alphafold3/run_alphafold_debug_sherlock.py
    json_config:
      model_seeds: [42]
      version: 2
    inference_config:
      base:
        model_dir: /scratch/users/zhkim216/model_params/af3
        db_dir: /scratch/users/zhkim216/af3_databases
        flash_attention_implementation: "triton"
      ss:  # Single-sequence prediction config (needed by make_af3_json)
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 0
        ligand_protein_template_conditioning_mode: 0
        mask_template_sidechains: true
        mask_template_sequence: true
      tc:  # Template-conditioned prediction config
        num_recycles: 1
        num_diffusion_samples: 1
        max_templates: 1
        ligand_protein_template_conditioning_mode: 1
        mask_template_sidechains: true
        mask_template_sequence: true
        max_template_date: "2021-09-30"

hydra:
  run:
    dir: /home/possu/jinho/hydra_outputs
