# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
exp_name: null # Wandb exp name
group: "eval_ld_debug" # Wandb group name

# Run settings
no_wandb: false # Disable wandb logging
seed: 0
subsample_n: 4  # number of samples to subsample at each step, null to use all samples
start_step: 0  # start evaluation after this global step, 0 or null to start from the beginning
skip_eval_types: []  # list of eval types to skip, e.g. ["unconditional", "designable"]

# Denoiser options
denoiser_train_dir:
out_dir: ${denoiser_train_dir}/eval_denoiser_training

# MPNN options
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 8
    number_of_batches: 1
    verbose: false

# Dataset for nnTM calculation, path to directory containing PDBs
nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
