# Wandb configuration
project: "allatom_design"  # Wandb project name
wandb_id: "richardshuai"  # Wandb username
exp_name: null  # Wandb exp name
group: "eval_bb_gen_debug" # Wandb group name

# Run settings
no_wandb: false  # Disable wandb logging
seed: 0
start_epoch: 0  # start evaluation after this epoch, 0 or null to start from the beginning
eval_every_n_ckpts: 1  # evaluate every n checkpoints, for speed
batch_size: 32
num_workers: 10

# Denoiser options
denoiser_train_dir:
out_dir: ${denoiser_train_dir}/eval_bb_gen

# Data options for overriding denoiser config (null values default to denoiser config)
data:
    pdb_path: /media/scratch/datasets/ingraham_cath_dataset
    designability_csv: /media/scratch/datasets/ingraham_cath_dataset/all_esmfold_native_with_cath_gapped_with_tm_with_seq.csv
    n_random_subset: null

# Sampling run parameters
length_range: [64, 128]
length_step_size: 8
n_samples_per_length: 2

# Backbone generation options
cond_labels: null

num_steps_list: [1, 20, 100]  # number of diffusion steps for backbone generation
timestep_schedule:
  num_steps: 10
  # for ca nco backbone diffusion
  ca:
    mode: "linear"
    num_steps: ${timestep_schedule.num_steps}
    t_start: 0.0
    t_end: 1.0
  nco:
    mode: "linear"
    num_steps: ${timestep_schedule.num_steps}
    t_start: 0.0
    t_end: 1.0

bb_diffusion:
  # Backbone diffusion parameters
  num_steps: 200
  noise_schedule:
    name: "linear"
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${bb_diffusion.num_steps}

ca_diffusion:
  # CA backbone diffusion parameters
  noise_schedule:
    name: "linear"
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${timestep_schedule.num_steps}

nco_diffusion:
  # NCO backbone diffusion parameters
  noise_schedule:
    name: "linear"
  churn_cfg:
    s_churn: 0
    s_noise: 1.0
    s_t_min: 0.01
    s_t_max: 50.0
    num_steps: ${timestep_schedule.num_steps}


# MPNN args
mpnn:
  mpnn_cfg: allatom_design/configs/mpnn/proteinmpnn.yaml
  mpnn_params_dir: /media/scratch/huang_lab/allatom_design/model_params/mpnn
  overrides:
    # num seqs per structure will be batch_size * number_of_batches
    batch_size: 8
    number_of_batches: 1
    verbose: false

# Dataset for nnTM calculation, path to directory containing PDBs, null to skip nnTM calculation
nntm_dataset: /media/scratch/datasets/ingraham_cath_dataset/pdb_store_renumbered

hydra:
  run:
    dir: /media/scratch/huang_lab/allatom_design/hydra_outputs
