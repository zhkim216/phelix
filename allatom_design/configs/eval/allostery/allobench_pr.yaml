########### Basic settings #########
debug: false
num_debug_samples: 5
seed: 0
direction: "ortho_to_allo"   # { "allo_to_active" | "ortho_to_allo" }

# Model checkpoint (Sherlock path)
ckpt_path: /oak/stanford/groups/possu/jinho/out_dir/ligand_seq_des/exp35_cfg2/checkpoints/ema/sd-step82500-epoch52-ema0.99.ckpt
sampling_cfg_path: /oak/stanford/groups/possu/jinho/allatom-design/allatom_design/configs/seq_des/lc_atom_mpnn_inference.yaml

# AlloBench inputs (Sherlock paths)
allobench_csv: /oak/stanford/groups/possu/jinho/allobench/AlloBench.csv
asd_csv: /oak/stanford/groups/possu/jinho/allobench/ASD_High_Resolution.csv
pdb_structures_dir: /oak/stanford/groups/possu/jinho/allobench/pdb_structures
monomer_only: true
min_chain_length: 30
max_tokens_for_forward: 1200

# Output
output_dir: /scratch/groups/possu/jinho/allobench_pr

# MMseqs2 alignment
mmseqs_bin: /oak/stanford/groups/possu/jinho/mmseqs/bin/mmseqs
mmseqs_threads: 8
min_alignment_identity: 0.8

# Orthosteric ligand inference
active_site_proximity: 5.0
ortho_cutoff: 6.0

# MAD thresholds
mad_k_values: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 5.0, 6.0]
mad_sigma_factor: 1.4826

# Distance-binned MAD: per-PDB equal-count quantile bins of distance to perturbation source.
n_distance_bins: 8

######### Data & Transform configurations #########
input_sample_is_designed: false

cif_parse_cfg:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: []
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  extra_fields: "all"

preprocess_cfg:
  undesired_res_names: []
  b_factor_min: null
  b_factor_max: null
  min_residues_for_polymers: 0
  remove_terminal_oxygen_protein: true
  remove_terminal_oxygen_nucleic_acid: true

featurizer_cfg:
  is_inference: true
  occupancy_threshold_protein_backbone: 0.0
  training_structure_noise: 0.0
  undesired_res_names: []
  remove_keys: []
  remove_unresolved_tokens: true
  max_tokens: null
  max_atoms: null
  pocket_distance: 6.0
  residue_cache_dir: "/scratch/groups/possu/jinho/atomworks_cached_residue_data"
  max_conformers_per_residue: 50
  apply_random_augmentation: false
  translation_scale: 1.0

hydra:
  run:
    dir: /scratch/groups/possu/jinho/hydra_outputs
