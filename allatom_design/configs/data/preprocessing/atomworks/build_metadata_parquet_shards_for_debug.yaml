mmcif_dir: /scratch/users/zhkim216/datasets/val_cifs/lmpnn_val_cifs/pdbs
out_dir: /scratch/users/zhkim216/datasets/debug_atomworks_lmpnn

num_workers: 23
max_file_size: 5000000

# Data preprocessor args to specify in addition to the cif parser args
data_preprocessor_cfg:
  from_rcsb: true
  build_assembly: "first"

  # Cutoff distances
  close_distance: 30.0
  contact_distance: 5
  clash_distance: 1.0
  # Misc
  ignore_residues: [] #! (JH) changed 250926
  # Efficiency
  polymer_pn_unit_limit: 500

# CIF parser args
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ['NA', 'CL', 'K', 'BR'] # SEP, TPO are excluded in this list, check atomworks/constants.py
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"

# --- sharding for multi-node runs ---
num_shards: 1       # total number of shards
shard_id: 0         # per-job shard id