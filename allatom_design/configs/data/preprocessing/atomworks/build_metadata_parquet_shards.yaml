mmcif_dir: /scratch/users/zhkim216/datasets/pdb_mirror
out_dir: /scratch/users/zhkim216/datasets/debug_atomworks_pdb_full_v5

num_workers: 8
max_file_size: 5000000

# OOM resilience settings
processing_timeout: 300       # Per-file timeout in seconds
batch_size: 256               # Save intermediate results every N files (enables resume)
max_tasks_per_child: 16       # Restart workers periodically to prevent memory leaks

# Data preprocessor args
data_preprocessor_cfg:
  from_rcsb: true
  build_assembly: "first"

  # Cutoff distances
  close_distance: 30.0
  contact_distance: 6
  clash_distance: 1.0
  # Misc
  ignore_residues: ["UNL", "UNX"] #! unknown ligands, and atoms
  # Efficiency
  polymer_pn_unit_limit: 500

# CIF parser args
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ["UNL", "UNX"] #! unknown ligands, and atoms
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  add_bond_types_from_struct_conn: ["covale"]

# --- sharding for multi-node runs ---
num_shards: 1000     # total number of shards
shard_id: 0   # per-job shard id
