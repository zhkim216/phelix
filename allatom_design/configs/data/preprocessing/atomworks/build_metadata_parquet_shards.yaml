mmcif_dir: /scratch/users/zhkim216/datasets/pdb_mirror
out_dir: /scratch/users/zhkim216/datasets/atomworks_pdb_full

num_workers: 31
max_file_size: 5000000

# Data preprocessor args
data_preprocessor_cfg:
  from_rcsb: true
  build_assembly: "first"

  # Cutoff distances
  close_distance: 30.0
  contact_distance: 5
  clash_distance: 1.0
  # Misc
  ignore_residues: ["UNX", "N", "DN", "UNL", "UNK"] #! unknown amino acids, RNA/DNA bases, ligands, and atoms
  # Efficiency
  polymer_pn_unit_limit: 500

# CIF parser args
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ["UNX", "N", "DN", "UNL", "UNK"] #! unknown amino acids, RNA/DNA bases, ligands, and atoms
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  add_bond_types_from_struct_conn: ["covale"]

# --- sharding for multi-node runs ---
num_shards: 20     # total number of shards
shard_id: 19    # per-job shard id
