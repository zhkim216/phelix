mmcif_dir: /scratch/users/zhkim216/datasets/pdb_mirror
out_dir: /scratch/users/zhkim216/datasets/atomworks_re

num_workers: 8

dataset:
  _target_: atomworks.ml.datasets.datasets.PandasDataset
  data: ${out_dir}/metadata_for_caching.parquet
  name: pdb
  id_column: example_id
  filters: null
  columns_to_load: null
  loader:
      _target_: atomworks.ml.datasets.parsers.base.load_example_from_metadata_row
      _partial_: true
      metadata_row_parser:
        _target_: atomworks.ml.datasets.parsers.default_metadata_row_parsers.GenericDFParser
        example_id_colname: example_id
        path_colname: path
        pn_unit_iid_colnames: null
        assembly_id_colname: null
        base_path: null
        extension: null
        attrs: null
      cif_parser_args: ${cif_parser_args}  
  save_failed_examples_to_dir: ${out_dir}/failed_cached_examples
  load_kwargs: null

# CIF parser args
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: [
    "144", "15P", "1PE", "2F2", "2JC", "3HR", "3SY", "7N5", "7PE", "9JE",
    "AAE", "ABA", "ACE", "ACN", "ACT", "ACY", "AZI", "BAM", "BCN", "BCT",
    "BDN", "BEN", "BME", "BO3", "BTB", "BTC", "BU1", "C8E", "CAD", "CAQ",
    "CBM", "CCN", "CIT", "CL", "CLR", "CM", "CMO", "CO3", "CPT", "CXS",
    "D10", "DEP", "DIO", "DMS", "DN", "DOD", "DOX", "EDO", "EEE", "EGL",
    "EOH", "EOX", "EPE", "ETF", "FCY", "FJO", "FLC", "FMT", "FW5", "GOL",
    "GSH", "GTT", "GYF", "HED", "IHP", "IHS", "IMD", "IOD", "IPA", "IPH",
    "LDA", "MB3", "MEG", "MES", "MLA", "MLI", "MOH", "MPD", "MRD", "MSE",
    "MYR", "N", "NA", "NH2", "NH4", "NHE", "NO3", "O4B", "OHE", "OLA",
    "OLC", "OMB", "OME", "OXA", "P6G", "PE3", "PE4", "PEG", "PEO", "PEP",
    "PG0", "PG4", "PGE", "PGR", "PLM", "PO4", "POL", "POP", "PVO", "SAR",
    "SCN", "SEO", "SIN", "SO4", "SPD", "SPM", "SR", "STE", "STO", "STU",
    "TAR", "TBU", "TME", "TRS", "UNK", "UNL", "UNX", "UPL", "URE"
  ]
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"

# --- sharding for multi-node runs ---
num_shards: 100      # total number of shards
shard_id: 0         # per-job shard id
