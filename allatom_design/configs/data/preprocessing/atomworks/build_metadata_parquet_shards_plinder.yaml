mmcif_dir: /home/possu/jinho/datasets/val_cifs/lmpnn_val_cifs/pdbs
out_dir: /home/possu/jinho/datasets/atomworks_debug_lmpnn

num_workers: 0
max_file_size: 1000000
save_imd: false

# Data preprocessor args to specify in addition to the cif parser args
data_preprocessor_cfg:
  from_rcsb: true
  build_assembly: "first"

  # Cutoff distances
  close_distance: 30.0
  contact_distance: 5
  clash_distance: 1.0
  # Misc
  ignore_residues: [] #! (JH) changed 250926
  # Efficiency
  polymer_pn_unit_limit: 500

# CIF parser args
