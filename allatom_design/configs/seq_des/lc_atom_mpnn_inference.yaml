defaults:
  - _self_

batch_size: 16
num_seqs_per_pdb: 1
verbose: true
num_workers: 8  # number of workers for data loading

# Sequence design options
use_potts_sampling: true
use_mlm_sampling: false  # if true, use MLM (order-agnostic autoregressive) sampling instead of Potts

skip_sampling: false  # if true, skip sampling and just return potts parameters
save_potts_params: false

omit_aas: null  # exclude certain aatypes globally, e.g. ["C", "G"]. "X" is always excluded.

potts_sampling_cfg:
  regularization: "LCP"
  potts_sweeps: 500
  potts_proposal: "dlmc"
  potts_temperature: 0.01  # this is the default in Chroma
  rejection_step: false
  potts_only_cond: false  # only condition on sequence in the potts model

  # add gaussian noise to inputs
  noise_std: 0.0

  # Classifier-free-style guidance: mix a ligand-conditioned ("cond") and
  # ligand-absent ("uncond") Potts proposal at each DLMC sweep. When
  # `enabled=false` this is a no-op and the sampler uses the cond branch
  # only. Two mixing schemes are implemented (see potts.py):
  #   - "rate"   (default): CFG mixing in DLMC transition-probability space
  #              via `_potts_proposal_dlmc_guidance`. Numerically robust at
  #              gamma > 1 thanks to the eps floor + per-entry clamp.
  #   - "energy": mix `h`, `J` linearly (γ·cond + (1-γ)·uncond) and run the
  #              standard `_potts_proposal_dlmc`. Exact sampler for the
  #              Boltzmann distribution of `U_guided = γ·U_cond + (1-γ)·U_uncond`;
  #              exploits the linearity of the Potts energy in (h, J). Requires
  #              edge_idx_cond == edge_idx_uncond (holds here because both
  #              branches share the same protein kNN graph).
  guidance_cfg:
    enabled: false
    gamma_list: [0.0, 0.5, 1.0, 1.5, 2.0]   # gamma > 1 = CFG extrapolation
    uncond_mode: "protein_only"              # only mode currently implemented
    guidance_mode: "rate"                    # "rate" | "energy"  (see above)
    clamp_mix_prob: true                     # per-entry [0,1] clamp on the mixed P_ij (only used when guidance_mode="rate")
    pocket_distance: 10.0                    # Å from any ligand atom to pseudo-Cβ for the pocket mask

mlm_sampling_cfg:
  num_steps: 50
  temperature: 0.1
  aatype_decoding_order_mode: "random"

  timestep_schedule:
    num_steps: ${mlm_sampling_cfg.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
