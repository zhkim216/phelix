defaults:
  - _self_

batch_size: 16
num_seqs_per_pdb: 1
verbose: true
num_workers: 8  # number of workers for data loading

# Sequence design options
use_potts_sampling: true

skip_sampling: false  # if true, skip sampling and just return potts parameters
save_potts_params: false

omit_aas: null  # exclude certain aatypes globally, e.g. ["C", "G"]. "X" is always excluded.

potts_sampling_cfg:
  regularization: "LCP"
  potts_sweeps: 500
  potts_proposal: "dlmc"
  potts_temperature: 0.01  # this is the default in Chroma
  rejection_step: false
  potts_only_cond: false  # only condition on sequence in the potts model

  # add gaussian noise to inputs
  noise_std: 0.0

mlm_sampling_cfg:
  num_steps: 50
  temperature: 0.1
  aatype_decoding_order_mode: "random"

  timestep_schedule:
    num_steps: ${mlm_sampling_cfg.num_steps}
    mode: "linear"
    t_start: 0.0
    t_end: 1.0
