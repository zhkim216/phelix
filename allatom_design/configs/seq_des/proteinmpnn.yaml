defaults:
  - _self_

model_type: "protein_mpnn" # Choose your model: protein_mpnn, ligand_mpnn, per_residue_label_membrane_mpnn, global_label_membrane_mpnn, soluble_mpnn
model_params_path: "./model_params" # Path to model parameters
batch_size: 1 # Number of sequence to generate per one pass.
number_of_batches: 1 # Number of times to design sequence using a chosen batch size.

checkpoints:
  protein_mpnn: "proteinmpnn_v_48_020.pt"
  ligand_mpnn: "ligandmpnn_v_32_010_25.pt"
  ca_only_mpnn: "v_48_020.pt"
  per_residue_label_membrane_mpnn: "per_residue_label_membrane_mpnn_v_48_020.pt"
  global_label_membrane_mpnn: "global_label_membrane_mpnn_v_48_020.pt"
  soluble_mpnn: "solublempnn_v_48_020.pt"

ligand_mpnn:
  use_atom_context: 1 # Use atom context
  cutoff_for_score: 8.0 # Cutoff in angstroms between protein and context atoms
  use_side_chain_context: 0 # Use side chain atoms as ligand context for the fixed residues


fasta_seq_separation: ":" # Symbol to use between sequences from different chains
verbose: 1 # Print stuff
pdb_path: "" # Path to the input PDB.
pdb_path_multi: "" # Path to json listing PDB paths.

fixed_residues: "" # Provide fixed residues, A12 A13 A14 B2 B25
fixed_residues_multi: "" # Path to json mapping of fixed residues for each pdb

redesigned_residues: "" # Provide to be redesigned residues, everything else will be fixed, A12 A13 A14 B2 B25
redesigned_residues_multi: "" # Path to json mapping of redesigned residues for each pdb

bias_AA: "" # Bias generation of amino acids, e.g. 'A:-1.024,P:2.34,C:-12.34'
bias_AA_per_residue: "" # Path to json mapping of bias {'A12': {'G': -0.3, 'C': -2.0, 'H': 0.8}, 'A13': {'G': -1.3}}
bias_AA_per_residue_multi: "" # Path to json mapping of bias

omit_AA: "" # Omit specific amino acids
omit_AA_per_residue: "" # Path to json mapping of omitted amino acids
omit_AA_per_residue_multi: "" # Path to json mapping of omitted amino acids

symmetry_residues: "" # List of lists for which residues need to be symmetric
symmetry_weights: "" # Weights that match symmetry_residues
homo_oligomer: 0 # Automatic homooligomer design setting

zero_indexed: 0 # Start output PDB numbering with 0
temperature: 0.1 # Temperature to sample sequences.
save_stats: 0 # Save output statistics

chains_to_design: "" # Specify which chains to redesign
parse_these_chains_only: "" # Provide chains letters for parsing backbones

transmembrane_buried: "" # Provide buried residues for specific model
transmembrane_interface: "" # Provide interface residues for specific model
global_transmembrane_label: 0 # Global label for specific model

parse_atoms_with_zero_occupancy: 0 # Parse atoms with zero occupancy in the PDB input files
pack_side_chains: 0 # Run side chain packer
checkpoint_path_sc: "./model_params/ligandmpnn_sc_v_32_002_16.pt" # Path to model weights for side chain packing
number_of_packs_per_design: 4 # Number of independent side chain packing samples per design
sc_num_denoising_steps: 3 # Number of denoising/recycling steps for side chain packing
sc_num_samples: 16 # Number of samples to draw from mixture distribution
repack_everything: 0 # Repacks side chains of all residues including the fixed ones
force_hetatm: 0 # Force ligand atoms to be written as HETATM to PDB file after packing
packed_suffix: "_packed" # Suffix for packed PDB paths
pack_with_ligand_context: 1 #
