defaults:
  - dataset@_here_: ligandmpnn  # Default: ligandmpnn, change to boltz for boltz dataset

task: ${model.task}
pdb_path: /scratch/users/zhkim216/datasets/atomworks_pdb_full_v3
train_metadata_path: /scratch/users/zhkim216/datasets/atomworks_pdb_full_v3/metadata_seq_clustered_04_filtered_grouped_250205.parquet

validation_ids_file: ??? #! Required, set by dataset/*.yaml
train_filters: ??? #! Required, set by dataset/*.yaml
val_filters: ??? #! Required, set by dataset/*.yaml
val_metadata_path: ??? #! Required, set by dataset/*.yaml

debug: ${train.debug}
debug_num_ids: 100 #! For debugging
save_failed_examples_to_dir: ${out_dir}/failed_examples #! Should be null if don't want to save failed examples
residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks_cached_residue_data
exclude_val_cluster: true
exclude_small_molecules_covalently_linked_to_protein: true
use_biologically_meaningful_small_molecule: true
grouping_scheme: "neighbor" # interface, neighbor

sampling_weights:
  alphas_interface:
    a_protein_protein: 0.0
    a_protein_nuc: 0.0
    a_protein_peptide: 0.0
    a_protein_small_molecule: 1.0 
    a_protein_metal: 0.0 
    a_protein_loi: 1.0      
  k_percentile: 100.0 # Adjust this value to control the balance between interface and monomer sampling

# CIF parser args. Not used during training since we've already cached the CIFs.
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: []
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"

pocket_only_training: false
interface_only_training: false  # Standard featurizer + interface-only sampling (exclude monomer)

featurizer_cfg:
  is_inference: false
  occupancy_threshold_protein_backbone: 0.0
  training_structure_noise: 0.3
  undesired_res_names: []
  remove_unresolved_tokens: true
  max_tokens: 256 #! DEBUG (min)
  max_atoms: 2304 #! DEBUG (min)
  crop_spatial_p_protein_monomer_chain: 0.25 # For monomer chain, 50% of the time, we crop spatially
  drop_prob_non_protein_chains: 0.0
  crop_center_cutoff_distance: 15.0
  # Interface crop constraints  
  min_protein_tokens_in_interface_crop: 20 # Ensure at least N protein tokens from the nearest protein pn_unit (chain) to the crop center.
  pocket_distance: 6.0
  use_pocket_rbf: ${denoiser.mpnn.token_features.use_pocket_rbf}
  pocket_rbf_distance: ${denoiser.mpnn.token_features.pocket_rbf_distance}
  residue_cache_dir: ${data.residue_cache_dir}
  max_conformers_per_residue: 50
  apply_random_augmentation: true
  translation_scale: 1.0
  asymmetric_noise: false
  protein_noise_scale: 0.3
  context_noise_scale: 0.05

# Pocket-only featurizer config (used when pocket_only_training is true)
pocket_featurizer_cfg:
  is_inference: false
  occupancy_threshold_protein_backbone: 0.0
  training_structure_noise: 0.1
  remove_unresolved_tokens: true
  # Pocket crop parameters
  max_tokens: 384          # Max tokens after pocket crop (also used for padding)
  max_atoms: 4608          # Max atoms for padding
  spatial_crop_radius: 15.0
  pocket_crop_distance: 5.0  # Distance (A) for identifying pocket residues
  use_pocket_rbf: ${denoiser.mpnn.token_features.use_pocket_rbf}
  pocket_rbf_distance: ${denoiser.mpnn.token_features.pocket_rbf_distance}
  apply_random_augmentation: true
  translation_scale: 1.0
  asymmetric_noise: false
  protein_noise_scale: 0.3
  context_noise_scale: 0.05

samples_per_epoch: 1000 #! DEBUG
batch_size: ${train.batch_size}
num_workers: ${num_workers}
random_seed: ${train.seed}