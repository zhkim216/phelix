defaults:
  - dataset@_here_: ligandmpnn  # Default: ligandmpnn, change to boltz for boltz dataset

task: ${model.task}
pdb_path: /home/possu/jinho/datasets/atomworks_pdb_full_v3
train_metadata_path: /home/possu/jinho/datasets/atomworks_pdb_full_v3/metadata_seq_clustered_04_lmpnn.parquet
plinder_ccd_list_path: 

validation_ids_file: ??? #! Required, set by dataset/*.yaml
train_filters: ??? #! Required, set by dataset/*.yaml
val_filters: ??? #! Required, set by dataset/*.yaml
val_metadata_path: ??? #! Required, set by dataset/*.yaml

debug: ${train.debug}
debug_num_ids: 100 #! For debugging
save_failed_examples_to_dir: ${out_dir}/failed_examples #! Should be null if don't want to save failed examples
residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks_cached_residue_data
exclude_val_cluster: true

sampling_weights:
  alphas_protein_monomer_chain:
    a_prot: 1.0
    a_nuc: 0.0
    a_peptide: 0.0
    a_small_molecule: 0.0 
    a_metal: 0.0 
    a_loi: 0.0    
  alphas_interface:
    a_prot: 1.0
    a_nuc: 1.0
    a_peptide: 1.0 
    a_small_molecule: 1.0 
    a_metal: 1.0 
    a_loi: 1.0
  betas:
    beta_protein_monomer_chain: 1.0
    beta_interface: 1.0
    
# CIF parser args. Not used during training since we've already cached the CIFs.
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: []
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"

featurizer_cfg:
  is_inference: false
  occupancy_threshold_protein_backbone: 0.0
  training_structure_noise: 0.3
  undesired_res_names: []
  remove_unresolved_tokens: true
  max_tokens: 256 #! DEBUG (min)
  max_atoms: 2304 #! DEBUG (min)
  crop_center_cutoff_distance: 15.0
  crop_spatial_p: 0.5 # For monomer chain, 50% of the time, we crop spatially
  drop_prob_non_protein_chains: 0.0
  # Interface crop constraints  
  min_protein_tokens_in_interface_crop: 20 # Ensure at least N protein tokens from the nearest protein pn_unit (chain) to the crop center.
  pocket_distance: 6.0
  residue_cache_dir: ${data.residue_cache_dir}
  max_conformers_per_residue: 50
  apply_random_augmentation: true
  translation_scale: 1.0

samples_per_epoch: 50000 #! DEBUG
batch_size: ${train.batch_size}
num_workers: ${num_workers}
random_seed: ${train.seed}