task: ${model.task}
pdb_path: /scratch/users/zhkim216/datasets/atomworks
parquet_path: ${data.pdb_path}/metadata_clustered.parquet
validation_ids_txt: ${data.pdb_path}/splits/boltz_lmpnn_validation_ids.txt  # Boltz val set ids. Filtering is case insensitive, no extension.
debug: ${train.debug}
debug_num_rows: 10000 #! For debugging
prefetch_buffer_size: 4
save_failed_examples_to_dir: ${out_dir}/failed_examples #! Should be null if don't want to save failed examples
residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks/cached_residue_data

sampling_weights:
  alphas_chain:
    a_prot: 1.0
    a_peptide: 0.0
    a_nuc: 0.0
    a_small_molecule: 0.0 #!(JH) changed 250925
    a_metal: 0.0 #!(JH) changed 250925
    a_loi: 0.0
  alphas_interface:
    a_prot: 1.0
    a_peptide: 0.0
    a_nuc: 0.0
    a_small_molecule: 1.0 #!(JH) changed 250925
    a_metal: 0.0 #!(JH) changed 250925
    a_loi: 0.0
  betas:
    beta_chain: 0.0 
    beta_interface: 1.0

train_filters:
  chain_filter1:
    - "num_polymer_pn_units < 4" #! DEBUG
    - "deposition_date <= '2021-09-30'"
    - "resolution < 9.0"
    - "n_prot > 0 or n_small_molecule > 0" # "n_prot > 0 or n_small_molecule > 0 or n_metal > 0"
    - "(n_prot > 0 and 16 < q_pn_unit_sequence_length < 256) or (n_prot == 0)" #! DEBUG      
  chain_filter2:
    - "n_prot > 0"
  interface:
    - "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1)" # "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_metal == 1)"

val_filters:
  chain_filter1:
    - "num_polymer_pn_units < 4" #! DEBUG
    - "'2021-09-30' < deposition_date <= '2023-01-13'"  # Boltz validation set dates.
    - "resolution < 4.5"
    - "n_prot > 0 or n_small_molecule > 0" # "n_prot > 0 or n_small_molecule > 0 or n_metal > 0"
    - "(n_prot > 0 and 16 < q_pn_unit_sequence_length < 512) or (n_prot == 0)" #! DEBUG      
  chain_filter2:
    - "n_prot > 0"
  interface:
    - "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1)" # "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_metal == 1)"

# CIF parser args. Not used during training since we've already cached the CIFs.
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: [
    "144", "15P", "1PE", "2F2", "2JC", "3HR", "3SY", "7N5", "7PE", "9JE",
    "AAE", "ABA", "ACE", "ACN", "ACT", "ACY", "AZI", "BAM", "BCN", "BCT",
    "BDN", "BEN", "BME", "BO3", "BTB", "BTC", "BU1", "C8E", "CAD", "CAQ",
    "CBM", "CCN", "CIT", "CL", "CLR", "CM", "CMO", "CO3", "CPT", "CXS",
    "D10", "DEP", "DIO", "DMS", "DN", "DOD", "DOX", "EDO", "EEE", "EGL",
    "EOH", "EOX", "EPE", "ETF", "FCY", "FJO", "FLC", "FMT", "FW5", "GOL",
    "GSH", "GTT", "GYF", "HED", "IHP", "IHS", "IMD", "IOD", "IPA", "IPH",
    "LDA", "MB3", "MEG", "MES", "MLA", "MLI", "MOH", "MPD", "MRD", "MSE",
    "MYR", "N", "NA", "NH2", "NH4", "NHE", "NO3", "O4B", "OHE", "OLA",
    "OLC", "OMB", "OME", "OXA", "P6G", "PE3", "PE4", "PEG", "PEO", "PEP",
    "PG0", "PG4", "PGE", "PGR", "PLM", "PO4", "POL", "POP", "PVO", "SAR",
    "SCN", "SEO", "SIN", "SO4", "SPD", "SPM", "SR", "STE", "STO", "STU",
    "TAR", "TBU", "TME", "TRS", "UNK", "UNL", "UNX", "UPL", "URE"
  ] # SEP, TPO are excluded in this list, check atomworks/constants.py
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  
featurizer_cfg:
  max_tokens: 256 #! DEBUG
  max_atoms: 2304 #! DEBUG
  crop_center_cutoff_distance: 15.0
  crop_spatial_p: 0.5
  remove_unresolved_tokens: true #! (JH) changed 250926,
  residue_cache_dir: ${data.residue_cache_dir}
  max_conformers_per_residue: 50
  apply_random_augmentation: true
  translation_scale: 1.0

samples_per_epoch: 1000 #! DEBUG
batch_size: ${train.batch_size}
num_workers: ${num_workers}
random_seed: ${train.seed}