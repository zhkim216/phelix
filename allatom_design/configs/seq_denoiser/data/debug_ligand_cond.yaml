task: ${model.task}
pdb_path: /scratch/users/zhkim216/datasets/debug_atomworks_lmpnn
parquet_path: ${data.pdb_path}/metadata_ligand_clustered_seq_clustered_03.parquet
validation_ids_file: /scratch/users/zhkim216/datasets/splits/lmpnn_val_list.csv  # Boltz val set ids. Filtering is case insensitive, no extension.
debug: ${train.debug}
debug_num_ids: 80 #! For debugging
prefetch_buffer_size: 4
save_failed_examples_to_dir: ${out_dir}/failed_examples #! Should be null if don't want to save failed examples
residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks_cached_residue_data
exclude_val_cluster: false

sampling_weights:
  alphas_chain:
    a_prot: 1.0
    a_peptide: 0.0
    a_nuc: 0.0
    a_small_molecule: 0.0 #!(JH) changed 250925
    a_metal: 0.0 #!(JH) changed 250925
    a_loi: 0.0
  alphas_interface:
    a_prot: 1.0
    a_peptide: 0.0
    a_nuc: 0.0
    a_small_molecule: 1.0 #!(JH) changed 250925
    a_metal: 0.0 #!(JH) changed 250925
    a_loi: 0.0
  betas:
    beta_chain: 1.0 
    beta_interface: 1.0

train_filters:
  chain_filter1:
    - "num_polymer_pn_units < 4" #! DEBUG
    # - "deposition_date <= '2022-12-16'"
    - "resolution < 9.0"
    - "n_prot > 0 or n_small_molecule > 0" # "n_prot > 0 or n_small_molecule > 0 or n_metal > 0"
    - "(n_prot > 0 and 16 < q_pn_unit_sequence_length < 256) or (n_prot == 0)" #! DEBUG      
  chain_filter2:
    - "n_prot > 0"
  interface:
    - "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1)" # "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_metal == 1)"

val_filters:
  chain_filter1:
    - "num_polymer_pn_units < 4" #! DEBUG
    # - "deposition_date <= '2022-12-16'"
    - "resolution < 4.5"
    - "n_prot > 0 or n_small_molecule > 0" # "n_prot > 0 or n_small_molecule > 0 or n_metal > 0"
    - "(n_prot > 0 and 16 < q_pn_unit_sequence_length < 512) or (n_prot == 0)" #! DEBUG      
  chain_filter2:
    - "n_prot > 0"
  interface:
    - "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1)" # "n_prot == 2 or (n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_metal == 1)"

# CIF parser args. Not used during training since we've already cached the CIFs.
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ['NA', 'CL', 'K', 'BR'] # SEP, TPO are excluded in this list, check atomworks/constants.py
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  
featurizer_cfg:
  max_tokens: 512 #! DEBUG
  max_atoms: 4608 #! DEBUG
  crop_center_cutoff_distance: 15.0
  crop_spatial_p: 0.5
  remove_unresolved_tokens: true #! (JH) changed 250926,
  residue_cache_dir: ${data.residue_cache_dir}
  max_conformers_per_residue: 50
  apply_random_augmentation: true
  translation_scale: 1.0

samples_per_epoch: 500 #! DEBUG
batch_size: ${train.batch_size}
num_workers: ${num_workers}
random_seed: ${train.seed}