task: ${model.task}
pdb_path: /scratch/users/zhkim216/datasets/debug_atomworks_lmpnn
parquet_path: ${data.pdb_path}/metadata_ligand_clustered_seq_clustered_03.parquet
validation_ids_file: /scratch/users/zhkim216/datasets/splits/lmpnn_val_list.csv  # Boltz val set ids. Filtering is case insensitive, no extension.
debug: ${train.debug}
debug_num_ids: 80 #! For debugging
prefetch_buffer_size: 4
save_failed_examples_to_dir: ${out_dir}/failed_examples #! Should be null if don't want to save failed examples
residue_cache_dir: /scratch/users/zhkim216/datasets/atomworks_cached_residue_data
exclude_val_cluster: false
ligand_clustered: false

data_loader_cfg:
  prefetch_factor: 1
  prefetch_buffer_size: 1
  train_pin_memory: true
  train_persistent_workers: true
  val_pin_memory: false
  val_persistent_workers: false

sampling_weights:
  alphas_chain:
    a_prot: 1.0
    a_small_molecule: 0.0 #! should be 0
    a_nuc: 0.0
    a_metal: 0.0 #! should be 0
  alphas_interface:
    a_prot: 1.0
    a_small_molecule: 1.0
    a_nuc: 0.0
    a_metal: 0.0
  betas:
    beta_chain: 1.0
    beta_interface: 1.0

train_filters:
  chain_filter_protein:
    - "num_polymer_pn_units < 4" #! DEBUG, to exclude big examples
    # - "deposition_date <= '2021-09-30'"
    - "resolution < 9.0"
    - "16 < q_pn_unit_sequence_length < 512" #! DEBUG      
  chain_filter_protein_ligand:
    - "num_polymer_pn_units < 4"
    - "resolution < 3.5"
    - "not (q_pn_unit_is_nuc_ligand and q_pn_unit_num_resolved_residues_in_nucleic_acid_chain_cluster <= 3)"
    - "not (q_pn_unit_is_peptide and q_pn_unit_num_resolved_residues <= 3)"
  interface:
    - "(n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_nuc == 1) or (n_prot == 1 and n_metal == 1)"

val_filters:
  chain_filter_protein:
    - "num_polymer_pn_units < 4" #! DEBUG, to exclude big examples
    # - "deposition_date <= '2021-09-30'"
    - "resolution < 9.0"
    - "16 < q_pn_unit_sequence_length < 512" #! DEBUG      
  chain_filter_protein_ligand:
    - "num_polymer_pn_units < 4"
    - "resolution < 3.5"
    - "not (q_pn_unit_is_nuc_ligand and q_pn_unit_num_resolved_residues_in_nucleic_acid_chain_cluster <= 3)"
    - "not (q_pn_unit_is_peptide and q_pn_unit_num_resolved_residues <= 3)"
  interface:
    - "(n_prot == 1 and n_small_molecule == 1) or (n_prot == 1 and n_nuc == 1) or (n_prot == 1 and n_metal == 1)"

# CIF parser args. Not used during training since we've already cached the CIFs.
cif_parser_args:
  add_missing_atoms: true
  remove_waters: true
  remove_ccds: ['NA', 'CL', 'K', 'BR'] # SEP, TPO are excluded in this list, check atomworks/constants.py
  fix_ligands_at_symmetry_centers: true
  fix_arginines: true
  convert_mse_to_met: true
  hydrogen_policy: "remove"
  
featurizer_cfg:
  max_tokens: 256 #! DEBUG
  max_atoms: 2304 #! DEBUG
  crop_center_cutoff_distance: 15.0
  crop_spatial_p: 0.5
  remove_unresolved_tokens: false #! (JH) changed 250926,
  residue_cache_dir: ${data.residue_cache_dir}
  max_conformers_per_residue: 50
  apply_random_augmentation: true
  translation_scale: 1.0

samples_per_epoch: 100 #! DEBUG
batch_size: ${train.batch_size}
num_workers: ${num_workers}
random_seed: ${train.seed}