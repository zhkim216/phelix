# ligandmpnn dataset configuration
# Override validation_ids_file and filters for Boltz dataset

validation_ids_file: /scratch/users/zhkim216/datasets/val_cifs/lmpnn_val_cifs/small_molecule_val_monomer_512.txt

train_filters:
  cif_filter:    
    - "release_date <= '2022-12-16'"
    - "resolution < 9.0" 
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"
    - "num_polymer_pn_units < 50"
  chain_filter:    
    - "q_pn_unit_is_protein"
    - "20 <= q_pn_unit_num_resolved_residues < 2048"
  interface: null    


val_filters:
  metadata_filter:    
    - "release_date <= '2022-12-16'"
    - "resolution < 3.5"         
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"      