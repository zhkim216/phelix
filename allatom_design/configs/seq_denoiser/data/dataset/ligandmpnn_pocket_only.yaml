# ligandmpnn dataset configuration
# Override validation_ids_file and filters for ligandmpnn dataset

validation_ids_file: /scratch/users/zhkim216/datasets/splits/lmpnn_validation_ids.txt
val_metadata_path: /scratch/users/zhkim216/datasets/val_cifs/lmpnn_val_cifs/metadata_lmpnnval_small_molecule_filtered_pocket_only.parquet

train_filters:
  metadata_filter:    
    - "release_date <= '2022-12-16'"
    - "resolution < 9.0" 
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"
    - "num_polymer_pn_units < 50"
  protein_monomer_chain_filter:    
    - "(q_pn_unit_is_protein and 20 <= q_pn_unit_num_resolved_residues < 2048)"    
  pocket_filter:
    "1": 
      - "resolution < 3.5"       
    "2":
      - "q_pn_unit_is_biologically_meaningful_small_molecule == True"
      - "q_pn_unit_expected_heavy_atoms_non_polymer <= 150"
      - "num_contacting_protein_chains == 1"
    

val_filters:
  metadata_filter:    
    - "release_date <= '2022-12-16'"
    - "resolution < 3.5"         
    - "clash_severity != 'severe'"
    - "~method.str.contains('NMR')"
    - "method in ['X-RAY_DIFFRACTION', 'ELECTRON_MICROSCOPY']"            