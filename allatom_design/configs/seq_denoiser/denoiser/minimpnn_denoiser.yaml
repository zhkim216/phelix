name: minimpnn

task: ${model.task}

pos_encoding: rotary_residx  # one of ["absolute", "absolute_residx", "rotary", "rotary_residx"]
use_self_conditioning_seq: false

defaults:
  - _self_
  - interpolant: edm_interpolant

minimpnn:
  autoregressive: false
  no_aatype_pred: false
  n_aatype: ${model.n_aatype}
  use_self_conditioning_seq: ${model.denoiser.use_self_conditioning_seq}
  use_time_cond: false
  use_esm: false

  n_channel: 128
  n_layers: 3
  k_neighbors: 48
  noise_cond_mult: 4

  model_type: "graph_transformer"
  augment_eps: 0.0
  dropout_p: 0.1
  dec_edge_up: true
  aggregation: "sum"
  return_embedding: "last"
  
  graph_transformer: 
    nns: [8,16,32,64]
    layers_per_nn: 4
    hidden_dim: 32
    input_dim: 37
    num_heads: 2 
    dim_key: 3
    out_dim: ${model.denoiser.minimpnn.n_channel}
    dim_pos_enc: 16
    pos_enc: true
    attn_bias: true

  esm:
    esm_type: "esm2_8M"  # one of ["esm2_8M", "esm2_35M", "esm2_150M", "esm2_650M", "esm2_3B", "esm2_15B"]
    n_tokens_embed: ${model.n_aatype}
    c_s: ${model.denoiser.minimpnn.n_channel}

seq_head:
  in_channels: ${model.denoiser.minimpnn.n_channel}
  n_aatype: ${model.n_aatype}

scn_diffusion_module:
  hidden_size: 256

  # Diffusion settings
  interpolant: ${model.denoiser.interpolant}
  use_self_conditioning: true
  self_cond_p: 0.5
  training_batch_size_mult: 4  # batch size multiplier for diffusion module
  translation_scale: ${data.translation_scale}

  dit:
    num_atoms_in: ${model.num_atoms_in}
    use_self_conditioning: ${model.denoiser.scn_diffusion_module.use_self_conditioning}
    n_aatype: ${model.n_aatype}
    self_cond_p: ${model.denoiser.scn_diffusion_module.self_cond_p}
    pos_encoding: ${model.denoiser.pos_encoding}

    # h_V conditioning
    c_h_V: ${denoiser.minimpnn.n_channel}

    # QK normalization
    qk_rmsnorm: true

    # Blocks
    depth: 4
    hidden_size: ${model.denoiser.scn_diffusion_module.hidden_size}
    num_heads: 8
    mlp_dropout: 0.0
    mlp_ratio: 4.0
    inf: ${model.inf}

  autoguidance: ${model.denoiser.autoguidance}

# Autoguidance for sidechain diffusion module
autoguidance:
  enabled: false
  subsample_train_iter_mult: 16  # train with roughly 1/K of the training iterations

  # Config for guiding model; overrides config for scn_diffusion_module DiT
  dit:
    depth: 3
    hidden_size: 192
    num_heads: 6
    mlp_dropout: 0.0
    mlp_ratio: 4.0
