name: motif_selector

# Probabilities for selecting each motif type
p:
  # Token-level motif selection
  unconditional: 0.25
  protein_contiguous: 0.25
  protein_discontiguous: 0.5

restype_mask_p:
  # Probability of masking out non-polymer residue types (along with the sidechain atoms)
  all: 1.0  # mask out all restypes
  uniform: 0.0  # mask out with probability from U[0, 1]

residx_mask_p:
  # Probability of masking out residue index
  all: 0.25
  none: 0.25
  uniform: 0.5  # mask out with probability from U[0, 1]

atom_p:
  # Atom-level motif selection
  all: 0.5  # select all atoms
  protein_sidechain: 0.0  # select only sidechain atoms
  protein_backbone: 0.5  # select only backbone atoms

# Configs
protein_contiguous:
  max_span_len: 20

protein_discontiguous:
  max_discontiguous_res: 20
  dist_threshold: 12.0
