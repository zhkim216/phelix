hydra:
  run:
    dir: ''
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=
    - hydra.mode=RUN
    task:
    - exp_name=aasd_gvp_pdb_eval_scn_pack
    - group=chimera_a10
    - wandb_id=talal-widatalla
    - num_workers=8
    - denoiser_train_dir=/scratch/hielab/talal/allatom_design/allatom_design/aasd_gvp_pdb
    - start_step=0
    - eval_every_n_ckpts=1
    - batch_size=64
    - data.pdb_path=/scratch/hielab/talal/datasets/casp15
    - data.designability_csv=
    - no_wandb=false
  job:
    name: eval_scn_pack_training
    chdir: null
    override_dirname: batch_size=64,data.designability_csv=,data.pdb_path=/scratch/hielab/talal/datasets/casp15,denoiser_train_dir=/scratch/hielab/talal/allatom_design/allatom_design/aasd_gvp_pdb,eval_every_n_ckpts=1,exp_name=aasd_gvp_pdb_eval_scn_pack,group=chimera_a10,no_wandb=false,num_workers=8,start_step=0,wandb_id=talal-widatalla
    id: ???
    num: ???
    config_name: eval_scn_pack_training
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/talal/allatom-design
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/talal/allatom-design/allatom_design/configs/eval
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/talal/allatom-design
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
